<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Axon Cord</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header -->
<div class="header">Chats</div>

<!-- Chat List Container -->
<div id="chatList" class="page-content">
  <p class="empty-text">No conversations yet</p>
</div>

<!-- Floating Button (UNCHANGED UI) -->
<div class="fab">
  <svg viewBox="0 0 24 24">
    <line x1="12" y1="5" x2="12" y2="19" stroke="white" stroke-width="2"/>
    <line x1="5" y1="12" x2="19" y2="12" stroke="white" stroke-width="2"/>
  </svg>
</div>

<!-- Bottom Navigation (UNCHANGED UI) -->
<div class="bottom-nav">
  <a href="index.html" class="active">
    <svg viewBox="0 0 24 24">
      <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>
    </svg>
    <span>Chats</span>
  </a>

  <a href="contacts.html">
    <svg viewBox="0 0 24 24">
      <path d="M16 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm-8 0a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm0 2c-4 0-6 2-6 4v1h8v-1c0-2-2-4-2-4zm8 0c-4 0-6 2-6 4v1h12v-1c0-2-4-4-6-4z"/>
    </svg>
    <span>Contacts</span>
  </a>

  <a href="profile.html">
    <svg viewBox="0 0 24 24">
      <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-5 0-9 2.5-9 5v1h18v-1c0-2.5-4-5-9-5z"/>
    </svg>
    <span>Profile</span>
  </a>
</div>

<!-- Logic -->
<script type="module">
import { protectPage } from "./auth.js";
import { listenToUserChats } from "./chatService.js";

protectPage();

/* LISTEN TO USER CHATS */
listenToUserChats((chats) => {

  const container = document.getElementById("chatList");
  container.innerHTML = "";

  if (chats.length === 0) {
    container.innerHTML = `<p class="empty-text">No conversations yet</p>`;
    return;
  }

  chats.forEach(chat => {

    const card = document.createElement("div");
    card.className = "contact-card";

    card.innerHTML = `
      <div class="contact-name">${chat.displayName}</div>
      <div class="contact-email">${chat.lastMessage}</div>
    `;

    card.onclick = () => {
      window.location.href = "chat.html?id=" + chat.chatId;
    };

    container.appendChild(card);
  });

});
</script>

</body>
</html>
