<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Axon Cord</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">Chats</div>

<!-- Chat List Area -->
<div id="chatList" style="padding:20px; padding-bottom:90px;">
  <p style="color:#6b7280;">No conversations yet</p>
</div>

<!-- Floating Plus Button -->
<div class="fab">
  <svg viewBox="0 0 24 24" fill="none">
    <line x1="12" y1="5" x2="12" y2="19" stroke="white" stroke-width="2"/>
    <line x1="5" y1="12" x2="19" y2="12" stroke="white" stroke-width="2"/>
  </svg>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <a href="index.html" class="active">
    <svg viewBox="0 0 24 24">
      <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>
    </svg>
    <span>Chats</span>
  </a>

  <a href="contacts.html">
    <svg viewBox="0 0 24 24">
      <path d="M16 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm-8 0a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm0 2c-4 0-6 2-6 4v1h8v-1c0-2-2-4-2-4zm8 0c-4 0-6 2-6 4v1h12v-1c0-2-4-4-6-4z"/>
    </svg>
    <span>Contacts</span>
  </a>

  <a href="profile.html">
    <svg viewBox="0 0 24 24">
      <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-5 0-9 2.5-9 5v1h18v-1c0-2.5-4-5-9-5z"/>
    </svg>
    <span>Profile</span>
  </a>
</div>

<!-- Logic -->
<script type="module">
import { protectPage } from "./auth.js";
import { findUserByEmail, createOrGetChat } from "./chatService.js";

protectPage();

/* PLUS BUTTON CLICK */
document.querySelector(".fab").addEventListener("click", async () => {

  const email = prompt("Enter user's email:");

  if (!email) return;

  const userDoc = await findUserByEmail(email.trim());

  if (!userDoc) {
    alert("User not found.");
    return;
  }

  const chatId = await createOrGetChat(userDoc.id);

  window.location.href = "chat.html?id=" + chatId;
});
</script>

</body>
</html>
