<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard — NexusPanel</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #03050d;
    --bg2:      #070c1a;
    --panel:    rgba(8,12,24,0.9);
    --panel2:   rgba(10,16,32,0.7);
    --border:   rgba(88,101,242,0.2);
    --border2:  rgba(88,101,242,0.1);
    --accent:   #5865F2;
    --accent-h: #7289da;
    --glow:     rgba(88,101,242,0.4);
    --cyan:     #00d4ff;
    --green:    #22c55e;
    --yellow:   #f9c74f;
    --red:      #f38ba8;
    --text:     #cdd6f4;
    --muted:    #525a7a;
    --font:     'Rajdhani', sans-serif;
    --mono:     'Share Tech Mono', monospace;
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── CANVAS ── */
  #bgCanvas {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.5;
  }

  /* ── SCAN LINES ── */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 1;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px
    );
    pointer-events: none;
  }

  /* ════════════════════ TOPBAR ════════════════════ */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px;
    height: 60px;
    background: rgba(3,5,13,0.95);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }

  .topbar-left {
    display: flex; align-items: center; gap: 14px;
  }
  .topbar-logo-icon {
    display: flex; align-items: center; justify-content: center;
    width: 34px; height: 34px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: rgba(88,101,242,0.08);
  }
  .topbar-logo-icon svg { width: 18px; height: 18px; }
  .topbar-brand {
    font-size: 18px; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase; color: #fff;
  }
  .topbar-tag {
    font-family: var(--mono);
    font-size: 9px; color: var(--muted);
    letter-spacing: 0.15em;
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 1px;
  }



  /* User pill */
  .user-pill {
    display: flex; align-items: center; gap: 10px;
    padding: 5px 12px 5px 5px;
    border: 1px solid var(--border);
    border-radius: 2px;
    background: rgba(88,101,242,0.06);
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    position: relative;
  }
  .user-pill:hover {
    background: rgba(88,101,242,0.12);
    border-color: rgba(88,101,242,0.4);
  }
  .user-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    border: 1.5px solid var(--accent);
    object-fit: cover;
    box-shadow: 0 0 10px var(--glow);
  }
  .user-info { display: flex; flex-direction: column; gap: 1px; }
  .user-name {
    font-size: 13px; font-weight: 700; letter-spacing: 0.05em; color: #fff;
    line-height: 1;
  }
  .user-status {
    font-family: var(--mono); font-size: 9px;
    color: var(--green); letter-spacing: 0.1em;
  }
  .pill-arrow {
    font-size: 10px; color: var(--muted); margin-left: 2px;
    transition: transform 0.2s;
  }
  .user-pill:hover .pill-arrow { transform: rotate(180deg); }

  /* Dropdown */
  .user-dropdown {
    position: absolute; top: calc(100% + 8px); right: 0;
    background: rgba(8,12,24,0.98);
    border: 1px solid var(--border);
    border-radius: 2px;
    min-width: 180px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.7);
    overflow: hidden;
    opacity: 0; pointer-events: none; transform: translateY(-8px);
    transition: all 0.2s;
    z-index: 200;
  }
  .user-dropdown.open { opacity: 1; pointer-events: all; transform: translateY(0); }
  .dropdown-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.06em; color: var(--muted);
    cursor: pointer; border: none; background: none;
    width: 100%; text-align: left; text-decoration: none;
    transition: color 0.2s, background 0.2s;
  }
  .dropdown-item:hover { color: var(--text); background: rgba(88,101,242,0.08); }
  .dropdown-item.danger:hover { color: var(--red); background: rgba(243,139,168,0.06); }
  .dropdown-divider { height: 1px; background: var(--border2); margin: 4px 0; }


  .welcome-banner {
    background: linear-gradient(135deg, rgba(88,101,242,0.12) 0%, rgba(0,212,255,0.06) 100%);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 24px 28px;
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 24px;
    position: relative; overflow: hidden;
    animation: cardIn 0.4s cubic-bezier(.22,1,.36,1) both;
  }
  .welcome-banner::before {
    content: ''; position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--cyan));
  }
  .welcome-avatar {
    width: 56px; height: 56px; border-radius: 50%;
    border: 2px solid var(--accent);
    box-shadow: 0 0 20px var(--glow);
    flex-shrink: 0;
  }
  .welcome-text h2 {
    font-size: 22px; font-weight: 700; color: #fff; letter-spacing: 0.05em;
  }
  .welcome-text p {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    letter-spacing: 0.1em; margin-top: 4px;
  }
  .welcome-badge {
    margin-left: auto; flex-shrink: 0;
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 10px; color: var(--green);
    border: 1px solid rgba(34,197,94,0.25);
    padding: 6px 14px; border-radius: 2px;
    background: rgba(34,197,94,0.06);
  }
  .welcome-badge::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 6px var(--green);
    animation: blink 2s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }


</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<!-- ════ TOPBAR ════ -->
<nav class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo-icon">
      <svg viewBox="0 0 32 32" fill="none">
        <polygon points="16,2 28,9 28,23 16,30 4,23 4,9" stroke="#5865F2" stroke-width="1.5" fill="none"/>
        <polygon points="16,8 22,11.5 22,20.5 16,24 10,20.5 10,11.5" stroke="#00d4ff" stroke-width="1" fill="rgba(88,101,242,0.15)"/>
        <circle cx="16" cy="16" r="2.5" fill="#5865F2"/>
      </svg>
    </div>
    <span class="topbar-brand">NexusPanel</span>
    <span class="topbar-tag">v2.4.1</span>
  </div>

  <div style="position:relative;">
    <div class="user-pill" id="userPill" onclick="toggleDropdown()">
      <img class="user-avatar" id="topAvatar" src="" alt="avatar"/>
      <div class="user-info">
        <div class="user-name" id="topUsername">Loading...</div>
        <div class="user-status">● ONLINE</div>
      </div>
      <div class="pill-arrow">▾</div>
    </div>

    <div class="user-dropdown" id="userDropdown">
      <a href="#" class="dropdown-item">⚙ Profile Settings</a>
      <a href="#" class="dropdown-item">🔔 Notifications</a>
      <div class="dropdown-divider"></div>
      <button class="dropdown-item danger" onclick="logout()">⏻ Sign Out</button>
    </div>
  </div>
</nav>



<!-- ════ CONTENT ════ -->
<div style="position:relative; z-index:2; padding: 40px 48px;">
  <div class="welcome-banner">
    <img class="welcome-avatar" id="welcomeAvatar" src="" alt="avatar"/>
    <div class="welcome-text">
      <h2>Welcome back, <span id="welcomeName">...</span></h2>
      <p>DISCORD ID: <span id="welcomeId">...</span> // SESSION ACTIVE</p>
    </div>
    <div class="welcome-badge">AUTHENTICATED</div>
  </div>
</div>

<script>
  // ── AUTH GUARD ─────────────────────────────────────────────────────
  const raw  = localStorage.getItem('discord_user');
  if (!raw) { window.location.href = 'index.html'; }
  const user = JSON.parse(raw);

  // ── POPULATE UI ─────────────────────────────────────────────────────
  const displayName = user.globalName || user.username;

  document.getElementById('topAvatar').src       = user.avatar;
  document.getElementById('topUsername').textContent = displayName;
  document.getElementById('welcomeAvatar').src   = user.avatar;
  document.getElementById('welcomeName').textContent = displayName;
  document.getElementById('welcomeId').textContent   = user.id;


  // ── DROPDOWN ────────────────────────────────────────────────────────
  function toggleDropdown() {
    document.getElementById('userDropdown').classList.toggle('open');
  }
  document.addEventListener('click', (e) => {
    if (!document.getElementById('userPill').contains(e.target))
      document.getElementById('userDropdown').classList.remove('open');
  });

  // ── LOGOUT ──────────────────────────────────────────────────────────
  function logout() {
    localStorage.removeItem('discord_user');
    window.location.href = 'index.html';
  }

  // ── BACKGROUND CANVAS ────────────────────────────────────────────────
  const canvas = document.getElementById('bgCanvas');
  const ctx    = canvas.getContext('2d');
  let W, H, dots = [];
  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    dots = [];
    const cols = Math.ceil(W/90), rows = Math.ceil(H/90);
    for (let x=0;x<=cols;x++) for(let y=0;y<=rows;y++)
      dots.push({x:x*90,y:y*90,ox:x*90,oy:y*90,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,r:Math.random()+.3,a:Math.random()*.35+.05});
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<dots.length;i++){
      const d=dots[i];
      d.x+=d.vx; d.y+=d.vy;
      d.vx+=(d.ox-d.x)*.0005; d.vy+=(d.oy-d.y)*.0005;
      for(let j=i+1;j<dots.length;j++){
        const e=dots[j],dx=d.x-e.x,dy=d.y-e.y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<120){ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(e.x,e.y);ctx.strokeStyle=`rgba(88,101,242,${0.05*(1-dist/120)})`;ctx.lineWidth=.5;ctx.stroke();}
      }
      ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fillStyle=`rgba(88,101,242,${d.a})`;ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize);
  resize(); draw();
</script>
</body>
</html>
