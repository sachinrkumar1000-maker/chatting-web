<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Leaderboard — Sovereigns Kingdom</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#03050d; --panel:rgba(8,12,24,0.9);
    --border:rgba(88,101,242,0.2); --border2:rgba(88,101,242,0.1);
    --accent:#5865F2; --glow:rgba(88,101,242,0.4);
    --cyan:#00d4ff; --green:#22c55e; --yellow:#fbbf24; --red:#f38ba8;
    --text:#cdd6f4; --muted:#525a7a;
    --font:'Rajdhani',sans-serif; --mono:'Share Tech Mono',monospace;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  #bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.4; }
  body::after { content: ''; position: fixed; inset: 0; z-index: 1; background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 4px); pointer-events: none; }

  .topbar { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 28px; height: 60px; background: rgba(3,5,13,0.95); border-bottom: 1px solid var(--border); backdrop-filter: blur(20px); }
  .topbar-left { display: flex; align-items: center; gap: 14px; }
  .logo-icon { display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; border: 1px solid var(--border); border-radius: 2px; background: rgba(88,101,242,0.08); }
  .topbar-brand { font-size: 18px; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: #fff; }
  .topbar-tag { font-family: var(--mono); font-size: 9px; color: var(--muted); border: 1px solid var(--border); padding: 2px 7px; border-radius: 1px; }
  .back-btn { display: flex; align-items: center; gap: 7px; font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; color: var(--muted); text-decoration: none; border: 1px solid var(--border); padding: 6px 14px; border-radius: 2px; transition: all 0.2s; }
  .back-btn svg { width: 12px; height: 12px; }
  .back-btn:hover { color: var(--text); background: rgba(88,101,242,0.08); border-color: rgba(88,101,242,0.4); }
  .user-pill { display: flex; align-items: center; gap: 10px; padding: 5px 12px 5px 5px; border: 1px solid var(--border); border-radius: 2px; background: rgba(88,101,242,0.06); cursor: pointer; position: relative; transition: all 0.2s; }
  .user-pill:hover { background: rgba(88,101,242,0.12); border-color: rgba(88,101,242,0.4); }
  .u-avatar { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--accent); object-fit: cover; box-shadow: 0 0 10px var(--glow); }
  .u-name { font-size: 13px; font-weight: 700; color: #fff; line-height: 1; }
  .u-status { font-family: var(--mono); font-size: 9px; color: var(--green); }
  .pill-arrow { font-size: 10px; color: var(--muted); margin-left: 2px; transition: transform 0.2s; }
  .user-pill:hover .pill-arrow { transform: rotate(180deg); }
  .user-dropdown { position: absolute; top: calc(100% + 8px); right: 0; background: rgba(8,12,24,0.98); border: 1px solid var(--border); border-radius: 2px; min-width: 210px; box-shadow: 0 10px 40px rgba(0,0,0,0.7); opacity: 0; pointer-events: none; transform: translateY(-8px); transition: all 0.2s; z-index: 200; overflow: hidden; }
  .user-dropdown.open { opacity: 1; pointer-events: all; transform: translateY(0); }
  .dd-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; font-size: 13px; font-weight: 600; letter-spacing: 0.06em; color: var(--muted); cursor: pointer; border: none; background: none; width: 100%; text-align: left; text-decoration: none; transition: all 0.2s; }
  .dd-item svg { width: 14px; height: 14px; flex-shrink: 0; }
  .dd-item:hover { color: var(--text); background: rgba(88,101,242,0.08); }
  .dd-item.danger:hover { color: var(--red); background: rgba(243,139,168,0.06); }
  .dd-divider { height: 1px; background: var(--border2); margin: 4px 0; }

  .content { position: relative; z-index: 2; padding: 40px 48px; max-width: 860px; }

  /* HEADER BANNER */
  .lb-banner { background: linear-gradient(135deg, rgba(251,191,36,0.1) 0%, rgba(88,101,242,0.08) 100%); border: 1px solid rgba(251,191,36,0.2); border-radius: 2px; padding: 24px 28px; margin-bottom: 28px; display: flex; align-items: center; gap: 20px; position: relative; overflow: hidden; animation: fadeUp 0.4s cubic-bezier(.22,1,.36,1) both; }
  .lb-banner::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, #fbbf24, var(--accent)); }
  .lb-trophy { font-size: 42px; line-height: 1; flex-shrink: 0; filter: drop-shadow(0 0 12px rgba(251,191,36,0.6)); }
  .lb-title { font-size: 26px; font-weight: 700; color: #fff; letter-spacing: 0.1em; text-transform: uppercase; }
  .lb-sub { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.12em; margin-top: 4px; }
  .lb-badge { margin-left: auto; font-family: var(--mono); font-size: 10px; color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); padding: 6px 14px; border-radius: 2px; background: rgba(251,191,36,0.06); flex-shrink: 0; }

  /* TOP 3 PODIUM */
  .podium-row { display: flex; gap: 12px; margin-bottom: 28px; align-items: flex-end; }
  .podium-slot { flex: 1; background: var(--panel); border: 1px solid var(--border); border-radius: 2px; padding: 20px 16px; display: flex; flex-direction: column; align-items: center; gap: 10px; text-align: center; position: relative; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
  .podium-slot:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.4); }
  .podium-slot.first  { border-color: rgba(251,191,36,0.4); background: linear-gradient(180deg, rgba(251,191,36,0.08) 0%, rgba(8,12,24,0.9) 60%); padding-top: 28px; }
  .podium-slot.second { border-color: rgba(148,163,184,0.3); }
  .podium-slot.third  { border-color: rgba(205,124,47,0.3); }
  .podium-slot::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .podium-slot.first::before  { background: linear-gradient(90deg, transparent, #fbbf24, transparent); box-shadow: 0 0 12px rgba(251,191,36,0.6); }
  .podium-slot.second::before { background: linear-gradient(90deg, transparent, #94a3b8, transparent); }
  .podium-slot.third::before  { background: linear-gradient(90deg, transparent, #cd7c2f, transparent); }
  .podium-medal { font-size: 28px; line-height: 1; }
  .podium-rank { font-family: var(--mono); font-size: 9px; letter-spacing: 0.2em; font-weight: 700; }
  .podium-slot.first  .podium-rank { color: #fbbf24; }
  .podium-slot.second .podium-rank { color: #94a3b8; }
  .podium-slot.third  .podium-rank { color: #cd7c2f; }
  .podium-avatar { border-radius: 50%; object-fit: cover; border: 3px solid; }
  .podium-slot.first  .podium-avatar { width: 64px; height: 64px; border-color: #fbbf24; box-shadow: 0 0 20px rgba(251,191,36,0.4); }
  .podium-slot.second .podium-avatar { width: 52px; height: 52px; border-color: #94a3b8; }
  .podium-slot.third  .podium-avatar { width: 52px; height: 52px; border-color: #cd7c2f; }
  .podium-name { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: 0.04em; }
  .podium-pts { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; }
  .podium-slot.first  .podium-pts { color: #fbbf24; }
  .podium-slot.second .podium-pts { color: #94a3b8; }
  .podium-slot.third  .podium-pts { color: #cd7c2f; }
  .podium-wins { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-top: 2px; }
  .podium-win-badge { font-family: var(--mono); font-size: 9px; padding: 2px 6px; border-radius: 1px; }
  .podium-win-badge.g { color: #fbbf24; background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.2); }
  .podium-win-badge.s { color: #94a3b8; background: rgba(148,163,184,0.1); border: 1px solid rgba(148,163,184,0.2); }
  .podium-win-badge.b { color: #cd7c2f; background: rgba(205,124,47,0.1); border: 1px solid rgba(205,124,47,0.2); }
  .podium-empty { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.12em; opacity: 0.5; }

  /* FULL TABLE */
  .lb-table { background: var(--panel); border: 1px solid var(--border); border-radius: 2px; overflow: hidden; }
  .lb-table-header { display: grid; grid-template-columns: 48px 1fr 72px 72px 72px 80px; padding: 10px 20px; background: rgba(88,101,242,0.06); border-bottom: 1px solid var(--border); font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase; }
  .lb-row { display: grid; grid-template-columns: 48px 1fr 72px 72px 72px 80px; padding: 12px 20px; border-bottom: 1px solid var(--border2); align-items: center; transition: background 0.15s; animation: fadeUp 0.35s cubic-bezier(.22,1,.36,1) both; }
  .lb-row:last-child { border-bottom: none; }
  .lb-row:hover { background: rgba(88,101,242,0.04); }
  .lb-row.is-me { background: rgba(88,101,242,0.08); border-left: 2px solid var(--accent); }
  .lb-rank { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--muted); text-align: center; }
  .lb-rank.top1 { color: #fbbf24; font-size: 16px; }
  .lb-rank.top2 { color: #94a3b8; }
  .lb-rank.top3 { color: #cd7c2f; }
  .lb-player { display: flex; align-items: center; gap: 10px; }
  .lb-avatar { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border); object-fit: cover; }
  .lb-pname { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: 0.04em; }
  .lb-ptag  { font-family: var(--mono); font-size: 9px; color: var(--muted); letter-spacing: 0.08em; margin-top: 1px; }
  .lb-num { font-family: var(--mono); font-size: 13px; font-weight: 700; text-align: center; }
  .lb-num.gold   { color: #fbbf24; }
  .lb-num.silver { color: #94a3b8; }
  .lb-num.bronze { color: #cd7c2f; }
  .lb-pts { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--accent); text-align: center; }
  .me-tag { font-family: var(--mono); font-size: 8px; color: var(--accent); border: 1px solid rgba(88,101,242,0.3); padding: 1px 5px; border-radius: 1px; margin-left: 6px; vertical-align: middle; }

  .empty-state { display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 60px 20px; text-align: center; }
  .empty-state p { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 0.15em; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 640px) {
    .topbar { padding: 0 14px; }
    .topbar-tag { display: none; }
    .topbar-brand { font-size: 14px; }
    .content { padding: 20px 14px; }
    .podium-row { gap: 8px; }
    .lb-table-header { grid-template-columns: 36px 1fr 48px 48px 48px 60px; font-size: 8px; padding: 8px 12px; }
    .lb-row { grid-template-columns: 36px 1fr 48px 48px 48px 60px; padding: 10px 12px; }
    .lb-banner { padding: 16px; gap: 12px; }
    .lb-badge { display: none; }
  }
  @media (max-width: 400px) {
    .topbar-brand { display: none; }
    .lb-table-header { grid-template-columns: 32px 1fr 40px 40px 40px 52px; }
    .lb-row { grid-template-columns: 32px 1fr 40px 40px 40px 52px; }
  }
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<svg style="display:none">
  <symbol id="i-left"   viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></symbol>
  <symbol id="i-user"   viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></symbol>
  <symbol id="i-list"   viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></symbol>
  <symbol id="i-trophy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4a2 2 0 01-2-2V5h4M18 9h2a2 2 0 002-2V5h-4"/><path d="M6 5h12v6a6 6 0 01-12 0V5z"/><path d="M12 17v4M8 21h8"/></symbol>
  <symbol id="i-logout" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></symbol>
</svg>

<nav class="topbar">
  <div class="topbar-left">
    <div class="logo-icon">
      <svg viewBox="0 0 32 32" fill="none" width="18" height="18">
        <polygon points="16,2 28,9 28,23 16,30 4,23 4,9" stroke="#5865F2" stroke-width="1.5" fill="none"/>
        <polygon points="16,8 22,11.5 22,20.5 16,24 10,20.5 10,11.5" stroke="#00d4ff" stroke-width="1" fill="rgba(88,101,242,0.15)"/>
        <circle cx="16" cy="16" r="2.5" fill="#5865F2"/>
      </svg>
    </div>
    <span class="topbar-brand">Sovereigns Kingdom</span>
    <span class="topbar-tag">v2.5.0</span>
    <a href="dashboard.html" class="back-btn"><svg><use href="#i-left"/></svg> Dashboard</a>
  </div>
  <div style="position:relative;">
    <div class="user-pill" id="userPill" onclick="toggleDropdown()">
      <img class="u-avatar" id="topAvatar" src="" alt=""/>
      <div style="display:flex;flex-direction:column;gap:1px;">
        <div class="u-name" id="topName">...</div>
        <div class="u-status">● ONLINE</div>
      </div>
      <div class="pill-arrow">▾</div>
    </div>
    <div class="user-dropdown" id="userDropdown">
      <a href="profile.html"           class="dd-item"><svg><use href="#i-user"/></svg>   My Profile</a>
      <a href="my-registrations.html"  class="dd-item"><svg><use href="#i-list"/></svg>   My Registrations</a>
      <a href="leaderboard.html"       class="dd-item"><svg><use href="#i-trophy"/></svg> Leaderboard</a>
      <div class="dd-divider"></div>
      <button class="dd-item danger" onclick="logout()"><svg><use href="#i-logout"/></svg> Sign Out</button>
    </div>
  </div>
</nav>

<div class="content">
  <div class="lb-banner">
    <div class="lb-trophy">🏆</div>
    <div>
      <div class="lb-title">Leaderboard</div>
      <div class="lb-sub">ALL-TIME TOURNAMENT WINNERS // RANKED BY POINTS</div>
    </div>
    <div class="lb-badge" id="lbBadge">0 PLAYERS</div>
  </div>

  <div id="podiumWrap" style="display:none;">
    <div style="font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:0.18em;margin-bottom:12px;">// TOP <span style="color:var(--accent)">PLAYERS</span></div>
    <div class="podium-row" id="podiumRow"></div>
  </div>

  <div style="font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:0.18em;margin-bottom:12px;">// FULL <span style="color:var(--accent)">RANKINGS</span></div>
  <div id="tableWrap">
    <div style="font-family:var(--mono);font-size:11px;color:var(--muted);padding:20px 0;letter-spacing:0.12em;">LOADING LEADERBOARD...</div>
  </div>
</div>

<script>
const raw = localStorage.getItem('discord_user');
if (!raw) window.location.href = 'index.html';
const user = JSON.parse(raw);
const dn = user.globalName || user.username;

document.getElementById('topAvatar').src = user.avatar;
document.getElementById('topName').textContent = dn;

async function loadLeaderboard() {
  try {
    const res = await fetch('/.netlify/functions/register/leaderboard');
    if (!res.ok) throw new Error('Failed');
    const data = await res.json();
    const board = data.leaderboard || [];
    renderLeaderboard(board);
  } catch(e) {
    document.getElementById('tableWrap').innerHTML =
      '<div style="font-family:var(--mono);font-size:11px;color:var(--muted);padding:20px 0;letter-spacing:0.1em;">Could not load leaderboard.</div>';
  }
}

function renderLeaderboard(board) {
  document.getElementById('lbBadge').textContent = `${board.length} PLAYER${board.length !== 1 ? 'S' : ''}`;

  // PODIUM (top 3)
  if (board.length > 0) {
    document.getElementById('podiumWrap').style.display = 'block';
    const podiumRow = document.getElementById('podiumRow');
    const podiumConfig = [
      { idx: 1, cls: 'second', medal: '🥈', rank: '2ND PLACE' },
      { idx: 0, cls: 'first',  medal: '🥇', rank: '1ST PLACE' },
      { idx: 2, cls: 'third',  medal: '🥉', rank: '3RD PLACE' },
    ];

    podiumConfig.forEach(({ idx, cls, medal, rank }) => {
      const p = board[idx];
      const slot = document.createElement('div');
      slot.className = `podium-slot ${cls}`;
      slot.style.animation = `fadeUp 0.4s cubic-bezier(.22,1,.36,1) ${idx*0.08}s both`;
      if (!p) {
        slot.innerHTML = `<div class="podium-medal" style="opacity:0.2">${medal}</div><div class="podium-rank">${rank}</div><div class="podium-empty">TBD</div>`;
      } else {
        const wins1 = p.wins['1st'] || 0, wins2 = p.wins['2nd'] || 0, wins3 = p.wins['3rd'] || 0;
        const isMe = p.discord_id === user.id;
        slot.innerHTML = `
          <div class="podium-medal">${medal}</div>
          <div class="podium-rank">${rank}</div>
          <img class="podium-avatar" src="${p.avatar}" alt="${p.display_name}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'"/>
          <div class="podium-name">${p.display_name}${isMe ? ' <span style="font-size:10px;color:var(--accent)">(you)</span>' : ''}</div>
          <div class="podium-pts">${p.total_points} PTS</div>
          <div class="podium-wins">
            ${wins1 ? `<div class="podium-win-badge g">🥇 ×${wins1}</div>` : ''}
            ${wins2 ? `<div class="podium-win-badge s">🥈 ×${wins2}</div>` : ''}
            ${wins3 ? `<div class="podium-win-badge b">🥉 ×${wins3}</div>` : ''}
          </div>`;
      }
      podiumRow.appendChild(slot);
    });
  }

  // FULL TABLE
  const tableWrap = document.getElementById('tableWrap');
  if (board.length === 0) {
    tableWrap.innerHTML = `<div class="empty-state"><p>NO WINNERS YET<br/>SET WINNERS WITH /winner IN DISCORD</p></div>`;
    return;
  }

  const table = document.createElement('div');
  table.className = 'lb-table';
  table.innerHTML = `
    <div class="lb-table-header">
      <div style="text-align:center">#</div>
      <div>Player</div>
      <div style="text-align:center">🥇</div>
      <div style="text-align:center">🥈</div>
      <div style="text-align:center">🥉</div>
      <div style="text-align:center">Points</div>
    </div>`;

  board.forEach((p, i) => {
    const isMe = p.discord_id === user.id;
    const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
    const rankLabel = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`;
    const row = document.createElement('div');
    row.className = `lb-row${isMe ? ' is-me' : ''}`;
    row.style.animationDelay = `${i * 0.04}s`;
    row.innerHTML = `
      <div class="lb-rank ${rankClass}">${rankLabel}</div>
      <div class="lb-player">
        <img class="lb-avatar" src="${p.avatar}" alt="${p.display_name}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'"/>
        <div>
          <div class="lb-pname">${p.display_name}${isMe ? '<span class="me-tag">YOU</span>' : ''}</div>
          <div class="lb-ptag">@${p.username}</div>
        </div>
      </div>
      <div class="lb-num gold">${p.wins['1st'] || 0}</div>
      <div class="lb-num silver">${p.wins['2nd'] || 0}</div>
      <div class="lb-num bronze">${p.wins['3rd'] || 0}</div>
      <div class="lb-pts">${p.total_points}</div>`;
    table.appendChild(row);
  });

  tableWrap.innerHTML = '';
  tableWrap.appendChild(table);
}

loadLeaderboard();

function toggleDropdown() { document.getElementById('userDropdown').classList.toggle('open'); }
document.addEventListener('click', e => { if (!document.getElementById('userPill').contains(e.target)) document.getElementById('userDropdown').classList.remove('open'); });
function logout() { localStorage.removeItem('discord_user'); window.location.href = 'index.html'; }

const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W, H, dots = [];
function resize() {
  W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; dots = [];
  const c = Math.ceil(W/90), r = Math.ceil(H/90);
  for(let x=0;x<=c;x++) for(let y=0;y<=r;y++)
    dots.push({x:x*90,y:y*90,ox:x*90,oy:y*90,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,r:Math.random()+.3,a:Math.random()*.3+.04});
}
function draw() {
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<dots.length;i++){
    const d=dots[i]; d.x+=d.vx; d.y+=d.vy; d.vx+=(d.ox-d.x)*.0005; d.vy+=(d.oy-d.y)*.0005;
    for(let j=i+1;j<dots.length;j++){const e=dots[j],dx=d.x-e.x,dy=d.y-e.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<120){ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(e.x,e.y);ctx.strokeStyle=`rgba(88,101,242,${0.04*(1-dist/120)})`;ctx.lineWidth=.5;ctx.stroke();}}
    ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fillStyle=`rgba(88,101,242,${d.a})`;ctx.fill();
  }
  requestAnimationFrame(draw);
}
window.addEventListener('resize',resize); resize(); draw();
</script>
</body>
