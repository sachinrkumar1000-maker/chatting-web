<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="icon" href="sk-logo.webp" type="image/webp"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Leaderboard — Sovereigns Kingdom</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#03050d;--panel:rgba(8,12,24,0.92);
  --border:rgba(88,101,242,0.2);--border2:rgba(88,101,242,0.08);
  --accent:#5865F2;--glow:rgba(88,101,242,0.4);
  --cyan:#00d4ff;--green:#22c55e;--yellow:#fbbf24;--red:#f38ba8;
  --text:#cdd6f4;--muted:#525a7a;--muted2:#3a4260;
  --font:'Rajdhani',sans-serif;--mono:'Share Tech Mono',monospace;
  --r:3px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.4}
body::after{content:'';position:fixed;inset:0;z-index:1;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:62px;background:rgba(3,5,13,0.96);border-bottom:1px solid var(--border);backdrop-filter:blur(24px);box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-logo{display:flex;align-items:center;justify-content:center;width:36px;height:36px;background:transparent;flex-shrink:0}
.topbar-brand{font-size:17px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#fff}
.topbar-sep{width:1px;height:18px;background:var(--border)}
.topbar-tag{font-family:var(--mono);font-size:9px;color:var(--muted)}
.back-btn{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.1em;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:6px 14px;border-radius:var(--r);transition:all 0.2s}
.back-btn svg{width:11px;height:11px}
.back-btn:hover{color:var(--text);background:rgba(88,101,242,0.08);border-color:rgba(88,101,242,0.4)}
.user-pill{display:flex;align-items:center;gap:10px;padding:5px 12px 5px 5px;border:1px solid var(--border);border-radius:var(--r);background:rgba(88,101,242,0.05);cursor:pointer;transition:all 0.2s;position:relative;user-select:none}
.user-pill:hover{background:rgba(88,101,242,0.11);border-color:rgba(88,101,242,0.38)}
.u-avatar{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--accent);object-fit:cover;box-shadow:0 0 10px rgba(88,101,242,0.4)}
.u-name{font-size:13px;font-weight:700;color:#fff;line-height:1;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.u-status{font-family:var(--mono);font-size:9px;color:var(--green)}
.pill-chevron{transition:transform 0.22s cubic-bezier(.22,1,.36,1);flex-shrink:0}
.user-pill.open .pill-chevron{transform:rotate(180deg)}
.user-dropdown{position:absolute;top:calc(100%+10px);right:0;background:rgba(6,9,20,0.98);border:1px solid rgba(88,101,242,0.22);border-radius:var(--r);min-width:220px;box-shadow:0 16px 48px rgba(0,0,0,0.75);overflow:hidden;opacity:0;pointer-events:none;transform:translateY(-6px) scale(0.98);transition:opacity 0.18s,transform 0.22s cubic-bezier(.22,1,.36,1);z-index:200}
.user-dropdown.open{opacity:1;pointer-events:all;transform:translateY(0) scale(1)}
.dd-header{padding:12px 16px 10px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:10px}
.dd-header-av{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--accent);object-fit:cover;flex-shrink:0}
.dd-header-name{font-size:13px;font-weight:700;color:#fff}
.dd-header-id{font-family:var(--mono);font-size:9px;color:var(--muted)}
.dd-label{font-family:var(--mono);font-size:8px;color:var(--muted2);letter-spacing:0.2em;padding:6px 16px 2px}
.dd-item{display:flex;align-items:center;gap:11px;padding:9px 16px;font-size:13px;font-weight:600;letter-spacing:0.05em;color:var(--muted);cursor:pointer;border:none;background:none;width:100%;text-align:left;text-decoration:none;transition:color 0.15s,background 0.15s}
.dd-item:hover{color:#fff;background:rgba(88,101,242,0.09)}
.dd-item:hover .di-icon{color:var(--accent)}
.dd-item.danger:hover{color:var(--red);background:rgba(243,139,168,0.06)}
.dd-item.danger:hover .di-icon{color:var(--red)}
.di-icon{width:15px;height:15px;flex-shrink:0;transition:color 0.15s}
.dd-divider{height:1px;background:var(--border2);margin:4px 0}

/* CONTENT */
.content{position:relative;z-index:2;padding:36px 40px;max-width:980px;margin:0 auto}

/* PAGE BANNER */
.lb-banner{background:linear-gradient(135deg,rgba(251,191,36,0.08) 0%,rgba(88,101,242,0.06) 100%);border:1px solid rgba(251,191,36,0.18);border-radius:var(--r);padding:26px 30px;margin-bottom:32px;display:flex;align-items:center;gap:20px;position:relative;overflow:hidden;animation:fadeUp 0.4s cubic-bezier(.22,1,.36,1) both}
.lb-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#fbbf24,var(--accent),#fbbf24)}
.lb-banner-icon{width:56px;height:56px;border-radius:var(--r);background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lb-banner-icon svg{width:26px;height:26px;color:#fbbf24}
.lb-title{font-size:28px;font-weight:700;color:#fff;letter-spacing:0.08em;text-transform:uppercase}
.lb-sub{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.14em;margin-top:4px}
.lb-badge{margin-left:auto;font-family:var(--mono);font-size:9px;color:#fbbf24;border:1px solid rgba(251,191,36,0.25);padding:6px 14px;border-radius:var(--r);background:rgba(251,191,36,0.05);flex-shrink:0;letter-spacing:0.12em}

/* SECTION TITLE */
.sec-title{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.sec-title-text{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.22em;color:var(--muted);text-transform:uppercase;white-space:nowrap}
.sec-title-text em{color:var(--accent);font-style:normal}
.sec-rule{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

/* PODIUM */
.podium-row{display:flex;gap:12px;margin-bottom:36px;align-items:flex-end}
.podium-slot{flex:1;background:var(--panel);border:1px solid var(--border);border-radius:var(--r);padding:24px 16px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;position:relative;overflow:hidden;transition:transform 0.2s,box-shadow 0.2s;animation:fadeUp 0.4s cubic-bezier(.22,1,.36,1) both}
.podium-slot:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.5)}
.podium-slot.first{border-color:rgba(251,191,36,0.35);background:linear-gradient(180deg,rgba(251,191,36,0.07) 0%,rgba(8,12,24,0.92) 55%);padding-top:32px}
.podium-slot.second{border-color:rgba(148,163,184,0.25)}
.podium-slot.third{border-color:rgba(205,124,47,0.25)}
.p-top-line{position:absolute;top:0;left:0;right:0;height:2px}
.podium-slot.first .p-top-line{background:linear-gradient(90deg,transparent,#fbbf24,transparent);box-shadow:0 0 14px rgba(251,191,36,0.5)}
.podium-slot.second .p-top-line{background:linear-gradient(90deg,transparent,#94a3b8,transparent)}
.podium-slot.third .p-top-line{background:linear-gradient(90deg,transparent,#cd7c2f,transparent)}
.p-rank-num{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:0.18em}
.podium-slot.first .p-rank-num{color:#fbbf24}
.podium-slot.second .p-rank-num{color:#94a3b8}
.podium-slot.third .p-rank-num{color:#cd7c2f}
.podium-avatar{border-radius:50%;object-fit:cover;border:3px solid}
.podium-slot.first .podium-avatar{width:72px;height:72px;border-color:#fbbf24;box-shadow:0 0 24px rgba(251,191,36,0.4)}
.podium-slot.second .podium-avatar,.podium-slot.third .podium-avatar{width:58px;height:58px}
.podium-slot.second .podium-avatar{border-color:#94a3b8;box-shadow:0 0 14px rgba(148,163,184,0.3)}
.podium-slot.third .podium-avatar{border-color:#cd7c2f;box-shadow:0 0 14px rgba(205,124,47,0.3)}
.podium-name{font-size:14px;font-weight:700;color:#fff;letter-spacing:0.04em}
.podium-pts{font-family:var(--mono);font-size:10px;letter-spacing:0.12em}
.podium-slot.first .podium-pts{color:#fbbf24}
.podium-slot.second .podium-pts{color:#94a3b8}
.podium-slot.third .podium-pts{color:#cd7c2f}
.p-win-badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.p-win-badge{font-family:var(--mono);font-size:8px;padding:2px 7px;border-radius:2px;letter-spacing:0.1em}
.p-win-badge.g{color:#fbbf24;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.2)}
.p-win-badge.s{color:#94a3b8;background:rgba(148,163,184,0.08);border:1px solid rgba(148,163,184,0.2)}
.p-win-badge.b{color:#cd7c2f;background:rgba(205,124,47,0.08);border:1px solid rgba(205,124,47,0.2)}
.p-empty{font-family:var(--mono);font-size:10px;color:var(--muted2);letter-spacing:0.1em}
.p-av-empty{width:52px;height:52px;border-radius:50%;border:2px dashed var(--border2);display:flex;align-items:center;justify-content:center}
.p-av-empty svg{width:18px;height:18px;color:var(--muted2)}

/* TABLE */
.lb-table{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.lb-thead{display:grid;grid-template-columns:52px 1fr 64px 64px 64px 88px;padding:10px 20px;background:rgba(88,101,242,0.05);border-bottom:1px solid var(--border);font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:0.2em;text-transform:uppercase}
.lb-row{display:grid;grid-template-columns:52px 1fr 64px 64px 64px 88px;padding:13px 20px;border-bottom:1px solid var(--border2);align-items:center;transition:background 0.15s;animation:fadeUp 0.35s cubic-bezier(.22,1,.36,1) both}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:rgba(88,101,242,0.04)}
.lb-row.is-me{background:rgba(88,101,242,0.07);border-left:2px solid var(--accent)}
.lb-rank{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--muted2);text-align:center}
.lb-rank.r1{color:#fbbf24;font-size:15px}
.lb-rank.r2{color:#94a3b8}
.lb-rank.r3{color:#cd7c2f}
.lb-player{display:flex;align-items:center;gap:11px}
.lb-av{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);object-fit:cover}
.lb-row.is-me .lb-av{border-color:var(--accent)}
.lb-pname{font-size:14px;font-weight:700;color:#fff;letter-spacing:0.03em}
.lb-ptag{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.08em;margin-top:1px}
.lb-num{font-family:var(--mono);font-size:13px;font-weight:700;text-align:center}
.lb-num.g{color:#fbbf24}.lb-num.s{color:#94a3b8}.lb-num.b{color:#cd7c2f}
.lb-pts{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--accent);text-align:center}
.me-tag{font-family:var(--mono);font-size:8px;color:var(--accent);border:1px solid rgba(88,101,242,0.3);padding:1px 6px;border-radius:2px;margin-left:7px;vertical-align:middle}

.empty-state{display:flex;flex-direction:column;align-items:center;gap:14px;padding:60px 20px;text-align:center;color:var(--muted2)}
.empty-state svg{width:36px;height:36px;opacity:0.25}
.empty-state p{font-family:var(--mono);font-size:11px;letter-spacing:0.16em;line-height:1.8}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:640px){
  .topbar{padding:0 16px;height:56px}.topbar-sep,.topbar-tag{display:none}.topbar-brand{font-size:14px}
  .content{padding:20px 16px}
  .podium-row{gap:8px}
  .lb-thead{grid-template-columns:36px 1fr 44px 44px 44px 60px;font-size:7px;padding:8px 12px}
  .lb-row{grid-template-columns:36px 1fr 44px 44px 44px 60px;padding:10px 12px}
  .lb-badge{display:none}
  .podium-slot{padding:18px 10px 16px}
}
@media(max-width:400px){.topbar-brand{display:none}}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<svg style="display:none">
  <symbol id="i-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></symbol>
  <symbol id="i-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></symbol>
  <symbol id="i-list" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></symbol>
  <symbol id="i-trophy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4a2 2 0 01-2-2V5h4M18 9h2a2 2 0 002-2V5h-4"/><path d="M6 5h12v6a6 6 0 01-12 0V5z"/><path d="M12 17v4M8 21h8"/></symbol>
  <symbol id="i-logout" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></symbol>
  <symbol id="i-ticket" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5v2M15 11v2M15 17v2M5 5h14a2 2 0 012 2v3a2 2 0 000 4v3a2 2 0 01-2 2H5a2 2 0 01-2-2v-3a2 2 0 000-4V7a2 2 0 012-2z"/></symbol>
  <symbol id="i-shield" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></symbol>
</svg>

<nav class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">
      <img src="sk-logo.webp" alt="SK" style="width:32px;height:32px;object-fit:contain;border-radius:2px;"/>
    </div>
    <span class="topbar-brand">Sovereigns Kingdom</span>
    <div class="topbar-sep"></div>
    <span class="topbar-tag">v2.5.0</span>
    <a href="dashboard" class="back-btn"><svg><use href="#i-left"/></svg> Dashboard</a>
  </div>
  <div style="position:relative">
    <div class="user-pill" id="userPill" onclick="toggleDropdown()">
      <img class="u-avatar" id="topAvatar" src="" alt=""/>
      <div style="display:flex;flex-direction:column;gap:2px">
        <div class="u-name" id="topName">...</div>
        <div class="u-status">● ONLINE</div>
      </div>
      <svg class="pill-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    <div class="user-dropdown" id="userDropdown">
      <div class="dd-header">
        <img class="dd-header-av" id="dropAv" src="" alt=""/>
        <div>
          <div class="dd-header-name" id="dropName">—</div>
          <div class="dd-header-id" id="dropId">—</div>
        </div>
      </div>
      <div class="dd-label">Navigate</div>
      <a href="profile" class="dd-item"><svg class="di-icon"><use href="#i-user"/></svg> My Profile</a>
      <a href="my-registrations" class="dd-item"><svg class="di-icon"><use href="#i-list"/></svg> My Registrations</a>
      <a href="leaderboard" class="dd-item"><svg class="di-icon"><use href="#i-trophy"/></svg> Leaderboard</a>
      <a href="tickets" class="dd-item"><svg class="di-icon"><use href="#i-ticket"/></svg> Support Ticket</a>
      <a href="admin" id="adminLink" style="display:none" class="dd-item"><svg class="di-icon"><use href="#i-shield"/></svg> Admin Panel</a>
      <div class="dd-divider"></div>
      <button class="dd-item danger" onclick="logout()"><svg class="di-icon"><use href="#i-logout"/></svg> Sign Out</button>
    </div>
  </div>
</nav>

<div class="content">
  <!-- BANNER -->
  <div class="lb-banner">
    <div class="lb-banner-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 9H4a2 2 0 01-2-2V5h4M18 9h2a2 2 0 002-2V5h-4"/><path d="M6 5h12v6a6 6 0 01-12 0V5z"/><path d="M12 17v4M8 21h8"/>
      </svg>
    </div>
    <div>
      <div class="lb-title">Leaderboard</div>
      <div class="lb-sub">ALL-TIME TOURNAMENT WINNERS // RANKED BY POINTS</div>
    </div>
    <div class="lb-badge" id="lbBadge">— PLAYERS</div>
  </div>

  <!-- TOP 3 PODIUM -->
  <div id="podiumWrap" style="display:none">
    <div class="sec-title"><span class="sec-title-text">// Top <em>Players</em></span><div class="sec-rule"></div></div>
    <div class="podium-row" id="podiumRow"></div>
  </div>

  <!-- FULL TABLE -->
  <div class="sec-title"><span class="sec-title-text">// Full <em>Rankings</em></span><div class="sec-rule"></div></div>
  <div id="tableWrap">
    <div style="font-family:var(--mono);font-size:11px;color:var(--muted);padding:20px 0;letter-spacing:0.14em;">LOADING LEADERBOARD...</div>
  </div>
</div>

<script>
const raw = localStorage.getItem('discord_user');
if (!raw) window.location.href = 'index.html';
const user = JSON.parse(raw);
const dn = user.globalName || user.username;

document.getElementById('topAvatar').src = user.avatar;
document.getElementById('topName').textContent = dn;
document.getElementById('dropAv').src = user.avatar;
document.getElementById('dropName').textContent = dn;
document.getElementById('dropId').textContent = 'ID: ' + user.id;

async function loadLeaderboard() {
  try {
    const res = await fetch('/.netlify/functions/register/leaderboard');
    if (!res.ok) throw new Error('Failed');
    const data = await res.json();
    renderLeaderboard(data.leaderboard || []);
  } catch(e) {
    document.getElementById('tableWrap').innerHTML = '<div style="font-family:var(--mono);font-size:11px;color:var(--muted);padding:20px 0;letter-spacing:0.1em;">Could not load leaderboard.</div>';
  }
}

function renderLeaderboard(board) {
  document.getElementById('lbBadge').textContent = board.length + ' PLAYER' + (board.length !== 1 ? 'S' : '');

  if (board.length > 0) {
    document.getElementById('podiumWrap').style.display = 'block';
    const podiumRow = document.getElementById('podiumRow');
    const cfg = [
      { idx:1, cls:'second', rank:'2ND', delay:0.08 },
      { idx:0, cls:'first',  rank:'1ST', delay:0    },
      { idx:2, cls:'third',  rank:'3RD', delay:0.16 },
    ];
    cfg.forEach(({ idx, cls, rank, delay }) => {
      const p = board[idx];
      const slot = document.createElement('div');
      slot.className = 'podium-slot ' + cls;
      slot.style.animationDelay = delay + 's';
      if (!p) {
        slot.innerHTML = `<div class="p-top-line"></div><div class="p-rank-num">${rank} PLACE</div><div class="p-av-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><div class="p-empty">TBD</div>`;
      } else {
        const w1 = p.wins['1st']||0, w2 = p.wins['2nd']||0, w3 = p.wins['3rd']||0;
        const isMe = p.discord_id === user.id;
        slot.innerHTML = `
          <div class="p-top-line"></div>
          <div class="p-rank-num">${rank} PLACE</div>
          <img class="podium-avatar" src="${p.avatar}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'" alt=""/>
          <div class="podium-name">${p.display_name}${isMe ? ' <span style="font-size:10px;color:var(--accent)">(you)</span>' : ''}</div>
          <div class="podium-pts">${p.total_points} PTS</div>
          <div class="p-win-badges">
            ${w1 ? `<div class="p-win-badge g">1ST ×${w1}</div>` : ''}
            ${w2 ? `<div class="p-win-badge s">2ND ×${w2}</div>` : ''}
            ${w3 ? `<div class="p-win-badge b">3RD ×${w3}</div>` : ''}
          </div>`;
      }
      podiumRow.appendChild(slot);
    });
  }

  const tableWrap = document.getElementById('tableWrap');
  if (board.length === 0) {
    tableWrap.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 9H4a2 2 0 01-2-2V5h4M18 9h2a2 2 0 002-2V5h-4"/><path d="M6 5h12v6a6 6 0 01-12 0V5z"/><path d="M12 17v4M8 21h8"/></svg><p>NO WINNERS YET<br/>SET WINNERS WITH /winner IN DISCORD</p></div>`;
    return;
  }

  const table = document.createElement('div');
  table.className = 'lb-table';
  table.innerHTML = `<div class="lb-thead"><div style="text-align:center">Rank</div><div>Player</div><div style="text-align:center">Gold</div><div style="text-align:center">Silver</div><div style="text-align:center">Bronze</div><div style="text-align:center">Points</div></div>`;

  board.forEach((p, i) => {
    const isMe = p.discord_id === user.id;
    const rc = i===0?'r1':i===1?'r2':i===2?'r3':'';
    const rl = i===0?'1ST':i===1?'2ND':i===2?'3RD':`#${i+1}`;
    const row = document.createElement('div');
    row.className = `lb-row${isMe?' is-me':''}`;
    row.style.animationDelay = (i * 0.04) + 's';
    row.innerHTML = `
      <div class="lb-rank ${rc}">${rl}</div>
      <div class="lb-player">
        <img class="lb-av" src="${p.avatar}" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'" alt=""/>
        <div>
          <div class="lb-pname">${p.display_name}${isMe?'<span class="me-tag">YOU</span>':''}</div>
          <div class="lb-ptag">@${p.username}</div>
        </div>
      </div>
      <div class="lb-num g">${p.wins['1st']||0}</div>
      <div class="lb-num s">${p.wins['2nd']||0}</div>
      <div class="lb-num b">${p.wins['3rd']||0}</div>
      <div class="lb-pts">${p.total_points}</div>`;
    table.appendChild(row);
  });

  tableWrap.innerHTML = '';
  tableWrap.appendChild(table);
}

loadLeaderboard();

function toggleDropdown() {
  const pill = document.getElementById('userPill'), drop = document.getElementById('userDropdown');
  drop.classList.toggle('open'); pill.classList.toggle('open', drop.classList.contains('open'));
}

    document.getElementById('userDropdown').classList.remove('open');
    document.getElementById('userPill').classList.remove('open');
  }
});
function logout() { localStorage.removeItem('discord_user'); window.location.href = 'index.html'; }

const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W, H, dots = [];
function resize() {
  W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; dots = [];
  const c = Math.ceil(W/90), r = Math.ceil(H/90);
  for(let x=0;x<=c;x++) for(let y=0;y<=r;y++)
    dots.push({x:x*90,y:y*90,ox:x*90,oy:y*90,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,r:Math.random()+.3,a:Math.random()*.3+.04});
}
function draw() {
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<dots.length;i++){
    const d=dots[i]; d.x+=d.vx; d.y+=d.vy; d.vx+=(d.ox-d.x)*.0005; d.vy+=(d.oy-d.y)*.0005;
    for(let j=i+1;j<dots.length;j++){const e=dots[j],dx=d.x-e.x,dy=d.y-e.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<120){ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(e.x,e.y);ctx.strokeStyle=`rgba(88,101,242,${0.04*(1-dist/120)})`;ctx.lineWidth=.5;ctx.stroke();}}
    ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fillStyle=`rgba(88,101,242,${d.a})`;ctx.fill();
  }
  requestAnimationFrame(draw);
}
window.addEventListener('resize',resize); resize(); draw();
</script>
