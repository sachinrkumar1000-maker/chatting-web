<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">Chat</div>

<div id="messages" style="height:70vh;overflow-y:auto;padding:15px;"></div>

<div style="display:flex;border-top:1px solid #ddd;">
  <input id="messageInput"
         style="flex:1;padding:12px;border:none;outline:none;"
         placeholder="Type message...">

  <button id="sendBtn"
          style="padding:12px 16px;background:#2563eb;color:white;border:none;">
    Send
  </button>
</div>

<script type="module">
import { protectPage } from "./auth.js";
import { sendMessage, listenToMessages } from "./chatService.js";

protectPage();

const params = new URLSearchParams(window.location.search);
const chatId = params.get("id");

const messagesDiv = document.getElementById("messages");
const input = document.getElementById("messageInput");
const button = document.getElementById("sendBtn");

button.addEventListener("click", async () => {
  if (!input.value.trim()) return;
  await sendMessage(chatId, input.value);
  input.value = "";
});

listenToMessages(chatId, (messages) => {
  messagesDiv.innerHTML = "";

  messages.forEach(msg => {
    const div = document.createElement("div");
    div.style.margin = "8px 0";
    div.textContent = msg.text;
    messagesDiv.appendChild(div);
  });

  messagesDiv.scrollTop = messagesDiv.scrollHeight;
});
</script>

</body>
</html>
