<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Registrations — NexusPanel</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#03050d;--panel:rgba(8,12,24,0.9);--border:rgba(88,101,242,0.2);--border2:rgba(88,101,242,0.1);
    --accent:#5865F2;--accent-h:#7289da;--glow:rgba(88,101,242,0.4);
    --cyan:#00d4ff;--green:#22c55e;--yellow:#f9c74f;--red:#f38ba8;
    --text:#cdd6f4;--muted:#525a7a;
    --font:'Rajdhani',sans-serif;--mono:'Share Tech Mono',monospace;
  }
  html{scroll-behavior:smooth;}
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  #bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.5;}
  body::after{content:'';position:fixed;inset:0;z-index:1;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.05) 2px,rgba(0,0,0,0.05) 4px);pointer-events:none;}

  .topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:60px;background:rgba(3,5,13,0.95);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);box-shadow:0 4px 30px rgba(0,0,0,0.5);}
  .topbar-left{display:flex;align-items:center;gap:14px;}
  .topbar-logo-icon{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border:1px solid var(--border);border-radius:2px;background:rgba(88,101,242,0.08);}
  .topbar-logo-icon svg{width:18px;height:18px;}
  .topbar-brand{font-size:18px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:#fff;}
  .topbar-tag{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.15em;border:1px solid var(--border);padding:2px 7px;border-radius:1px;}
  .back-btn{display:flex;align-items:center;gap:6px;font-family:var(--font);font-size:13px;font-weight:700;letter-spacing:0.1em;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:6px 14px;border-radius:2px;transition:all 0.2s;}
  .back-btn:hover{color:var(--text);background:rgba(88,101,242,0.08);}

  .user-pill{display:flex;align-items:center;gap:10px;padding:5px 12px 5px 5px;border:1px solid var(--border);border-radius:2px;background:rgba(88,101,242,0.06);cursor:pointer;transition:background 0.2s,border-color 0.2s;position:relative;}
  .user-pill:hover{background:rgba(88,101,242,0.12);border-color:rgba(88,101,242,0.4);}
  .user-avatar{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--accent);object-fit:cover;box-shadow:0 0 10px var(--glow);}
  .user-info{display:flex;flex-direction:column;gap:1px;}
  .user-name{font-size:13px;font-weight:700;letter-spacing:0.05em;color:#fff;line-height:1;}
  .user-status{font-family:var(--mono);font-size:9px;color:var(--green);letter-spacing:0.1em;}
  .pill-arrow{font-size:10px;color:var(--muted);margin-left:2px;transition:transform 0.2s;}
  .user-pill:hover .pill-arrow{transform:rotate(180deg);}
  .user-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:rgba(8,12,24,0.98);border:1px solid var(--border);border-radius:2px;min-width:200px;box-shadow:0 10px 40px rgba(0,0,0,0.7);overflow:hidden;opacity:0;pointer-events:none;transform:translateY(-8px);transition:all 0.2s;z-index:200;}
  .user-dropdown.open{opacity:1;pointer-events:all;transform:translateY(0);}
  .dropdown-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;font-weight:600;letter-spacing:0.06em;color:var(--muted);cursor:pointer;border:none;background:none;width:100%;text-align:left;text-decoration:none;transition:color 0.2s,background 0.2s;}
  .dropdown-item:hover{color:var(--text);background:rgba(88,101,242,0.08);}
  .dropdown-item.danger:hover{color:var(--red);background:rgba(243,139,168,0.06);}
  .dropdown-divider{height:1px;background:var(--border2);margin:4px 0;}

  .content{position:relative;z-index:2;padding:40px 48px;}
  .page-header{margin-bottom:28px;}
  .page-title{font-size:28px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#fff;}
  .page-sub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.12em;margin-top:6px;}

  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:80px 20px;text-align:center;}
  .empty-icon{font-size:52px;opacity:0.3;}
  .empty-title{font-size:18px;font-weight:700;color:var(--muted);letter-spacing:0.1em;}
  .empty-sub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.1em;}
  .empty-btn{margin-top:8px;display:inline-flex;align-items:center;gap:8px;padding:10px 24px;background:rgba(88,101,242,0.12);border:1px solid rgba(88,101,242,0.4);border-radius:2px;color:#fff;font-family:var(--font);font-size:13px;font-weight:700;letter-spacing:0.1em;text-decoration:none;transition:all 0.2s;}
  .empty-btn:hover{background:var(--accent);box-shadow:0 0 20px rgba(88,101,242,0.4);}

  .reg-list{display:flex;flex-direction:column;gap:14px;}

  .reg-card{background:var(--panel);border:1px solid var(--border);border-radius:2px;padding:22px 24px;position:relative;overflow:hidden;animation:cardIn 0.4s cubic-bezier(.22,1,.36,1) both;display:flex;align-items:center;gap:20px;}
  .reg-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--t-color,var(--accent));box-shadow:0 0 10px var(--t-color,var(--glow));}
  .reg-icon{font-size:28px;flex-shrink:0;margin-left:8px;}
  .reg-info{flex:1;}
  .reg-name{font-size:17px;font-weight:700;color:#fff;letter-spacing:0.05em;margin-bottom:3px;}
  .reg-meta{display:flex;flex-wrap:wrap;gap:12px;margin-top:6px;}
  .reg-meta-item{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.1em;}
  .reg-meta-item span{color:var(--text);}
  .reg-date{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:4px;letter-spacing:0.08em;}

  .reg-actions{display:flex;flex-direction:column;gap:8px;flex-shrink:0;}
  .cancel-btn{padding:8px 18px;border-radius:2px;font-family:var(--font);font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;border:1px solid rgba(243,139,168,0.3);background:rgba(243,139,168,0.06);color:var(--red);transition:all 0.2s;}
  .cancel-btn:hover{background:rgba(243,139,168,0.12);border-color:rgba(243,139,168,0.5);}
  .confirm-btn{padding:8px 18px;border-radius:2px;font-family:var(--font);font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;border:1px solid rgba(243,139,168,0.6);background:var(--red);color:#fff;transition:all 0.2s;display:none;}
  .confirm-btn:hover{background:#e0647a;box-shadow:0 0 16px rgba(243,139,168,0.4);}
  .confirm-btn.show{display:block;}
  .cancel-abort{padding:4px 10px;font-family:var(--mono);font-size:9px;color:var(--muted);background:none;border:none;cursor:pointer;letter-spacing:0.1em;display:none;text-align:center;}
  .cancel-abort:hover{color:var(--text);}
  .cancel-abort.show{display:block;}

  .cancel-loader{display:none;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;margin:0 auto;}

  @keyframes cardIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<nav class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo-icon">
      <svg viewBox="0 0 32 32" fill="none">
        <polygon points="16,2 28,9 28,23 16,30 4,23 4,9" stroke="#5865F2" stroke-width="1.5" fill="none"/>
        <polygon points="16,8 22,11.5 22,20.5 16,24 10,20.5 10,11.5" stroke="#00d4ff" stroke-width="1" fill="rgba(88,101,242,0.15)"/>
        <circle cx="16" cy="16" r="2.5" fill="#5865F2"/>
      </svg>
    </div>
    <span class="topbar-brand">NexusPanel</span>
    <span class="topbar-tag">v2.4.1</span>
    <a href="dashboard.html" class="back-btn">← Dashboard</a>
  </div>
  <div style="position:relative;">
    <div class="user-pill" id="userPill" onclick="toggleDropdown()">
      <img class="user-avatar" id="topAvatar" src="" alt="avatar"/>
      <div class="user-info">
        <div class="user-name" id="topUsername">Loading...</div>
        <div class="user-status">● ONLINE</div>
      </div>
      <div class="pill-arrow">▾</div>
    </div>
    <div class="user-dropdown" id="userDropdown">
      <a href="my-registrations.html" class="dropdown-item">📋 My Registrations</a>
      <div class="dropdown-divider"></div>
      <button class="dropdown-item danger" onclick="logout()">⏻ Sign Out</button>
    </div>
  </div>
</nav>

<div class="content">
  <div class="page-header">
    <div class="page-title">📋 My Registrations</div>
    <div class="page-sub">ALL YOUR ACTIVE TOURNAMENT ENTRIES // <span id="regCount">0</span> REGISTERED</div>
  </div>
  <div id="regList"></div>
</div>

<script>
const TOURNAMENTS = [
  {id:'minecraft-pvp', name:'Minecraft PvP Tournament', game:'Minecraft', icon:'⚔️', color:'#22c55e'},
  {id:'valorant',      name:'Valorant Tournament',      game:'Valorant',  icon:'🎯', color:'#ff4655'},
  {id:'roblox',        name:'Roblox Tournament',        game:'Roblox',    icon:'🟥', color:'#f9c74f'},
  {id:'fortnite',      name:'Fortnite Tournament',      game:'Fortnite',  icon:'🏗️', color:'#00d4ff'},
];

const raw = localStorage.getItem('discord_user');
if (!raw) { window.location.href = 'index.html'; }
const user = JSON.parse(raw);
const displayName = user.globalName || user.username;

document.getElementById('topAvatar').src = user.avatar;
document.getElementById('topUsername').textContent = displayName;

function getMyRegs() { return JSON.parse(localStorage.getItem('my_registrations') || '{}'); }
function removeReg(id) {
  const r = getMyRegs(); delete r[id];
  localStorage.setItem('my_registrations', JSON.stringify(r));
}

function renderRegs() {
  const myRegs = getMyRegs();
  const keys = Object.keys(myRegs);
  const container = document.getElementById('regList');
  document.getElementById('regCount').textContent = keys.length;
  container.innerHTML = '';

  if (keys.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">NO REGISTRATIONS YET</div>
        <div class="empty-sub">You haven't registered for any tournaments.</div>
        <a href="dashboard.html" class="empty-btn">⚡ Browse Tournaments</a>
      </div>`;
    return;
  }

  const list = document.createElement('div');
  list.className = 'reg-list';

  keys.forEach((tid, idx) => {
    const reg = myRegs[tid];
    const t = TOURNAMENTS.find(x => x.id === tid) || {name: tid, icon: '🎮', color: '#5865F2'};
    const card = document.createElement('div');
    card.className = 'reg-card';
    card.style.setProperty('--t-color', t.color);
    card.style.animationDelay = `${idx * 0.07}s`;
    card.id = `card-${tid}`;
    card.innerHTML = `
      <div class="reg-icon">${t.icon}</div>
      <div class="reg-info">
        <div class="reg-name">${t.name}</div>
        <div class="reg-meta">
          <div class="reg-meta-item">👤 <span>${reg.name}</span></div>
          <div class="reg-meta-item">🎮 <span>${reg.game_username}</span></div>
          <div class="reg-meta-item">🌍 <span>${reg.timezone}</span></div>
        </div>
        <div class="reg-date">Registered: ${reg.submitted_at}</div>
      </div>
      <div class="reg-actions" id="actions-${tid}">
        <button class="cancel-btn" id="cancelBtn-${tid}" onclick="startCancel('${tid}')">✕ Cancel Registration</button>
        <button class="confirm-btn" id="confirmBtn-${tid}" onclick="confirmCancel('${tid}')">⚠ Confirm Cancel</button>
        <button class="cancel-abort" id="abortBtn-${tid}" onclick="abortCancel('${tid}')">keep registration</button>
        <div class="cancel-loader" id="loader-${tid}"></div>
      </div>
    `;
    list.appendChild(card);
  });
  container.appendChild(list);
}

function startCancel(tid) {
  document.getElementById(`cancelBtn-${tid}`).style.display = 'none';
  document.getElementById(`confirmBtn-${tid}`).classList.add('show');
  document.getElementById(`abortBtn-${tid}`).classList.add('show');
}
function abortCancel(tid) {
  document.getElementById(`cancelBtn-${tid}`).style.display = '';
  document.getElementById(`confirmBtn-${tid}`).classList.remove('show');
  document.getElementById(`abortBtn-${tid}`).classList.remove('show');
}

async function confirmCancel(tid) {
  const myRegs = getMyRegs();
  const reg = myRegs[tid];
  const t = TOURNAMENTS.find(x => x.id === tid) || {name: tid, icon:'🎮'};

  document.getElementById(`confirmBtn-${tid}`).style.display = 'none';
  document.getElementById(`abortBtn-${tid}`).classList.remove('show');
  document.getElementById(`loader-${tid}`).style.display = 'block';

  const payload = {
    action: 'cancel',
    tournament_id: tid,
    tournament_name: t.name,
    game: t.game || tid,
    discord_username: user.username,
    discord_id: user.id,
    discord_global_name: user.globalName || user.username,
    discord_avatar: user.avatar,
    name: reg.name,
    game_username: reg.game_username,
    submitted_at: reg.submitted_at,
    cancelled_at: new Date().toUTCString(),
  };

  try {
    await fetch('/.netlify/functions/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
  } catch(e) { console.warn('Cancel notify failed:', e); }

  removeReg(tid);

  // Fade out card
  const card = document.getElementById(`card-${tid}`);
  card.style.transition = 'opacity 0.4s, transform 0.4s';
  card.style.opacity = '0';
  card.style.transform = 'translateX(20px)';
  setTimeout(() => { renderRegs(); }, 400);
}

function toggleDropdown() { document.getElementById('userDropdown').classList.toggle('open'); }
document.addEventListener('click', e => {
  if (!document.getElementById('userPill').contains(e.target))
    document.getElementById('userDropdown').classList.remove('open');
});
function logout() { localStorage.removeItem('discord_user'); window.location.href = 'index.html'; }

renderRegs();

const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W, H, dots = [];
function resize() {
  W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; dots = [];
  const cols = Math.ceil(W/90), rows = Math.ceil(H/90);
  for(let x=0;x<=cols;x++) for(let y=0;y<=rows;y++)
    dots.push({x:x*90,y:y*90,ox:x*90,oy:y*90,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,r:Math.random()+.3,a:Math.random()*.35+.05});
}
function draw() {
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<dots.length;i++){
    const d=dots[i]; d.x+=d.vx; d.y+=d.vy;
    d.vx+=(d.ox-d.x)*.0005; d.vy+=(d.oy-d.y)*.0005;
    for(let j=i+1;j<dots.length;j++){
      const e=dots[j],dx=d.x-e.x,dy=d.y-e.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<120){ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(e.x,e.y);ctx.strokeStyle=`rgba(88,101,242,${0.05*(1-dist/120)})`;ctx.lineWidth=.5;ctx.stroke();}
    }
    ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fillStyle=`rgba(88,101,242,${d.a})`;ctx.fill();
  }
  requestAnimationFrame(draw);
}
window.addEventListener('resize',resize);
resize(); draw();
</script>
</body>
</html>
