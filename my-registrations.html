<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Registrations — Sovereigns Kingdom</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#03050d;--panel:rgba(8,12,24,0.92);
  --border:rgba(88,101,242,0.2);--border2:rgba(88,101,242,0.08);
  --accent:#5865F2;--accent-h:#7289da;--glow:rgba(88,101,242,0.4);
  --cyan:#00d4ff;--green:#22c55e;--yellow:#fbbf24;--red:#f38ba8;
  --text:#cdd6f4;--muted:#525a7a;--muted2:#3a4260;
  --font:'Rajdhani',sans-serif;--mono:'Share Tech Mono',monospace;
  --r:3px;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.4}
body::after{content:'';position:fixed;inset:0;z-index:1;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:62px;background:rgba(3,5,13,0.96);border-bottom:1px solid var(--border);backdrop-filter:blur(24px);box-shadow:0 8px 32px rgba(0,0,0,0.5)}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-logo{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border:1px solid rgba(88,101,242,0.3);border-radius:var(--r);background:rgba(88,101,242,0.07);flex-shrink:0}
.topbar-brand{font-size:17px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#fff}
.topbar-sep{width:1px;height:18px;background:var(--border)}
.topbar-tag{font-family:var(--mono);font-size:9px;color:var(--muted)}
.back-btn{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.1em;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:6px 14px;border-radius:var(--r);transition:all 0.2s}
.back-btn svg{width:11px;height:11px}
.back-btn:hover{color:var(--text);background:rgba(88,101,242,0.08);border-color:rgba(88,101,242,0.4)}
.user-pill{display:flex;align-items:center;gap:10px;padding:5px 12px 5px 5px;border:1px solid var(--border);border-radius:var(--r);background:rgba(88,101,242,0.05);cursor:pointer;transition:all 0.2s;position:relative;user-select:none}
.user-pill:hover{background:rgba(88,101,242,0.11);border-color:rgba(88,101,242,0.38)}
.u-avatar{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--accent);object-fit:cover;box-shadow:0 0 10px rgba(88,101,242,0.4)}
.u-name{font-size:13px;font-weight:700;color:#fff;line-height:1;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.u-status{font-family:var(--mono);font-size:9px;color:var(--green)}
.pill-chevron{transition:transform 0.22s cubic-bezier(.22,1,.36,1);flex-shrink:0}
.user-pill.open .pill-chevron{transform:rotate(180deg)}
.user-dropdown{position:absolute;top:calc(100%+10px);right:0;background:rgba(6,9,20,0.98);border:1px solid rgba(88,101,242,0.22);border-radius:var(--r);min-width:220px;box-shadow:0 16px 48px rgba(0,0,0,0.75);overflow:hidden;opacity:0;pointer-events:none;transform:translateY(-6px) scale(0.98);transition:opacity 0.18s,transform 0.22s cubic-bezier(.22,1,.36,1);z-index:200}
.user-dropdown.open{opacity:1;pointer-events:all;transform:translateY(0) scale(1)}
.dd-header{padding:12px 16px 10px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:10px}
.dd-header-av{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--accent);object-fit:cover;flex-shrink:0}
.dd-header-name{font-size:13px;font-weight:700;color:#fff}
.dd-header-id{font-family:var(--mono);font-size:9px;color:var(--muted)}
.dd-label{font-family:var(--mono);font-size:8px;color:var(--muted2);letter-spacing:0.2em;padding:6px 16px 2px}
.dd-item{display:flex;align-items:center;gap:11px;padding:9px 16px;font-size:13px;font-weight:600;letter-spacing:0.05em;color:var(--muted);cursor:pointer;border:none;background:none;width:100%;text-align:left;text-decoration:none;transition:color 0.15s,background 0.15s}
.dd-item:hover{color:#fff;background:rgba(88,101,242,0.09)}
.dd-item:hover .di-icon{color:var(--accent)}
.dd-item.danger:hover{color:var(--red);background:rgba(243,139,168,0.06)}
.dd-item.danger:hover .di-icon{color:var(--red)}
.di-icon{width:15px;height:15px;flex-shrink:0;transition:color 0.15s}
.dd-divider{height:1px;background:var(--border2);margin:4px 0}

/* CONTENT */
.content{position:relative;z-index:2;padding:36px 40px;max-width:960px;margin:0 auto}

/* PAGE HEADER */
.page-head{display:flex;align-items:center;gap:16px;margin-bottom:32px;animation:fadeUp 0.35s cubic-bezier(.22,1,.36,1) both}
.page-head-icon{width:48px;height:48px;border:1px solid var(--border);border-radius:var(--r);background:rgba(88,101,242,0.07);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.page-head-icon svg{width:22px;height:22px;color:var(--accent)}
.page-title{font-size:28px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#fff}
.page-sub{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:0.14em;margin-top:4px}
.page-count{font-family:var(--mono);font-size:10px;color:var(--accent)}

/* EMPTY */
.empty-state{display:flex;flex-direction:column;align-items:center;gap:16px;padding:80px 20px;text-align:center}
.empty-icon{width:64px;height:64px;border:1px solid var(--border2);border-radius:var(--r);display:flex;align-items:center;justify-content:center;opacity:0.3}
.empty-icon svg{width:28px;height:28px}
.empty-title{font-size:17px;font-weight:700;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase}
.empty-sub{font-family:var(--mono);font-size:11px;color:var(--muted2);letter-spacing:0.1em}
.empty-btn{margin-top:8px;display:inline-flex;align-items:center;gap:8px;padding:10px 24px;background:rgba(88,101,242,0.1);border:1px solid rgba(88,101,242,0.35);border-radius:var(--r);color:#fff;font-family:var(--font);font-size:13px;font-weight:700;letter-spacing:0.1em;text-decoration:none;transition:all 0.2s;text-transform:uppercase}
.empty-btn svg{width:14px;height:14px}
.empty-btn:hover{background:var(--accent);box-shadow:0 0 24px rgba(88,101,242,0.4)}

/* REG CARDS */
.reg-list{display:flex;flex-direction:column;gap:14px}
.reg-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;animation:cardIn 0.4s cubic-bezier(.22,1,.36,1) both;transition:border-color 0.2s,box-shadow 0.2s;position:relative}
.reg-card:hover{border-color:rgba(88,101,242,0.32);box-shadow:0 4px 24px rgba(0,0,0,0.4)}
.reg-card-stripe{height:2px;background:var(--t-color,var(--accent));box-shadow:0 0 10px var(--t-color,var(--glow))}
.reg-card-body{padding:20px 24px;display:flex;align-items:center;gap:20px}
.reg-icon{width:50px;height:50px;border-radius:var(--r);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(88,101,242,0.04)}
.reg-icon svg{width:24px;height:24px}
.reg-info{flex:1;min-width:0}
.reg-name{font-size:17px;font-weight:700;color:#fff;letter-spacing:0.04em;margin-bottom:10px}
.reg-meta{display:flex;flex-wrap:wrap;gap:16px}
.reg-meta-item{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.1em}
.reg-meta-item svg{width:11px;height:11px;flex-shrink:0}
.reg-meta-item span{color:var(--text)}
.reg-date{font-family:var(--mono);font-size:9px;color:var(--muted2);margin-top:8px;letter-spacing:0.08em}
.reg-actions{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.cancel-btn{display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--r);font-family:var(--font);font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;border:1px solid rgba(243,139,168,0.25);background:rgba(243,139,168,0.05);color:var(--red);transition:all 0.2s}
.cancel-btn svg{width:12px;height:12px}
.cancel-btn:hover{background:rgba(243,139,168,0.1);border-color:rgba(243,139,168,0.45)}
.confirm-btn{display:none;align-items:center;gap:7px;padding:8px 16px;border-radius:var(--r);font-family:var(--font);font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;border:1px solid rgba(243,139,168,0.5);background:var(--red);color:#fff;transition:all 0.2s}
.confirm-btn.show{display:flex}
.confirm-btn svg{width:12px;height:12px}
.confirm-btn:hover{background:#e0647a;box-shadow:0 0 18px rgba(243,139,168,0.35)}
.cancel-abort{display:none;padding:4px 10px;font-family:var(--mono);font-size:9px;color:var(--muted);background:none;border:none;cursor:pointer;letter-spacing:0.1em;text-align:center;text-transform:uppercase;transition:color 0.15s}
.cancel-abort:hover{color:var(--text)}
.cancel-abort.show{display:block}
.cancel-loader{display:none;width:16px;height:16px;border:2px solid rgba(243,139,168,0.2);border-top-color:var(--red);border-radius:50%;animation:spin 0.7s linear infinite}

@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:640px){
  .topbar{padding:0 16px;height:56px}.topbar-sep,.topbar-tag{display:none}.topbar-brand{font-size:14px}
  .content{padding:20px 16px}
  .reg-card-body{flex-wrap:wrap;gap:12px;padding:16px 18px}
  .reg-info{flex:1 1 100%}
  .reg-actions{width:100%;flex-direction:row;flex-wrap:wrap}
}
@media(max-width:400px){.topbar-brand{display:none}}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<svg style="display:none">
  <symbol id="i-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></symbol>
  <symbol id="i-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></symbol>
  <symbol id="i-list" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></symbol>
  <symbol id="i-trophy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4a2 2 0 01-2-2V5h4M18 9h2a2 2 0 002-2V5h-4"/><path d="M6 5h12v6a6 6 0 01-12 0V5z"/><path d="M12 17v4M8 21h8"/></symbol>
  <symbol id="i-logout" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></symbol>
  <symbol id="i-ticket" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5v2M15 11v2M15 17v2M5 5h14a2 2 0 012 2v3a2 2 0 000 4v3a2 2 0 01-2 2H5a2 2 0 01-2-2v-3a2 2 0 000-4V7a2 2 0 012-2z"/></symbol>
  <symbol id="i-shield" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></symbol>
  <symbol id="i-sword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2.5l7 7-11 11-3-3 7-7-7-7z"/><path d="M3.5 20.5l3-3"/><path d="M2 22l2-2"/></symbol>
  <symbol id="i-target" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></symbol>
  <symbol id="i-grid" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></symbol>
  <symbol id="i-zap" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></symbol>
  <symbol id="i-gamepad" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="12" rx="2"/><path d="M6 12h4M8 10v4M15 11h.01M17 13h.01"/></symbol>
  <symbol id="i-globe" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20"/></symbol>
  <symbol id="i-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></symbol>
  <symbol id="i-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></symbol>
  <symbol id="i-alert" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></symbol>
  <symbol id="i-plus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></symbol>
</svg>

<nav class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">
      <svg viewBox="0 0 32 32" fill="none" width="20" height="20">
        <polygon points="16,2 28,9 28,23 16,30 4,23 4,9" stroke="#5865F2" stroke-width="1.5" fill="none"/>
        <polygon points="16,8 22,11.5 22,20.5 16,24 10,20.5 10,11.5" stroke="#00d4ff" stroke-width="1" fill="rgba(88,101,242,0.15)"/>
        <circle cx="16" cy="16" r="2.5" fill="#5865F2"/>
      </svg>
    </div>
    <span class="topbar-brand">Sovereigns Kingdom</span>
    <div class="topbar-sep"></div>
    <span class="topbar-tag">v2.5.0</span>
    <a href="dashboard" class="back-btn"><svg><use href="#i-left"/></svg> Dashboard</a>
  </div>
  <div style="position:relative">
    <div class="user-pill" id="userPill" onclick="toggleDropdown()">
      <img class="u-avatar" id="topAvatar" src="" alt=""/>
      <div style="display:flex;flex-direction:column;gap:2px">
        <div class="u-name" id="topName">...</div>
        <div class="u-status">● ONLINE</div>
      </div>
      <svg class="pill-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    <div class="user-dropdown" id="userDropdown">
      <div class="dd-header">
        <img class="dd-header-av" id="dropAv" src="" alt=""/>
        <div>
          <div class="dd-header-name" id="dropName">—</div>
          <div class="dd-header-id" id="dropId">—</div>
        </div>
      </div>
      <div class="dd-label">Navigate</div>
      <a href="profile" class="dd-item"><svg class="di-icon"><use href="#i-user"/></svg> My Profile</a>
      <a href="my-registrations" class="dd-item"><svg class="di-icon"><use href="#i-list"/></svg> My Registrations</a>
      <a href="leaderboard" class="dd-item"><svg class="di-icon"><use href="#i-trophy"/></svg> Leaderboard</a>
      <a href="tickets" class="dd-item"><svg class="di-icon"><use href="#i-ticket"/></svg> Support Ticket</a>
      <a href="admin" id="adminLink" style="display:none" class="dd-item"><svg class="di-icon"><use href="#i-shield"/></svg> Admin Panel</a>
      <div class="dd-divider"></div>
      <button class="dd-item danger" onclick="logout()"><svg class="di-icon"><use href="#i-logout"/></svg> Sign Out</button>
    </div>
  </div>
</nav>

<div class="content">
  <div class="page-head">
    <div class="page-head-icon"><svg><use href="#i-list"/></svg></div>
    <div>
      <div class="page-title">My Registrations</div>
      <div class="page-sub">ACTIVE TOURNAMENT ENTRIES &nbsp;// &nbsp;<span class="page-count" id="regCount">0 REGISTERED</span></div>
    </div>
  </div>
  <div id="regList"></div>
</div>

<script>
const ICON_MAP = { sword:'#i-sword', target:'#i-target', grid:'#i-grid', zap:'#i-zap' };
function hexColor(n) { return '#' + (n>>>0).toString(16).padStart(6,'0'); }

const raw = localStorage.getItem('discord_user');
if (!raw) window.location.href = 'index.html';
const user = JSON.parse(raw);
const dn = user.globalName || user.username;

document.getElementById('topAvatar').src = user.avatar;
document.getElementById('topName').textContent = dn;
document.getElementById('dropAv').src = user.avatar;
document.getElementById('dropName').textContent = dn;
document.getElementById('dropId').textContent = 'ID: ' + user.id;

async function loadAndRender() {
  const container = document.getElementById('regList');
  container.innerHTML = '<div style="font-family:var(--mono);font-size:11px;color:var(--muted);padding:20px 0;letter-spacing:0.14em;">LOADING...</div>';
  let myRegs = {}, serverTournaments = {};
  try {
    const [myRes, stateRes] = await Promise.all([
      fetch(`/.netlify/functions/register/my-registrations/${user.id}`),
      fetch('/.netlify/functions/register'),
    ]);
    if (myRes.ok) { const d = await myRes.json(); myRegs = d.registrations || {}; }
    if (stateRes.ok) { const d = await stateRes.json(); serverTournaments = d.tournaments || {}; }
  } catch(e) { console.warn('Failed:', e); }

  const keys = Object.keys(myRegs);
  document.getElementById('regCount').textContent = keys.length + ' REGISTERED';
  container.innerHTML = '';

  if (keys.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><svg><use href="#i-list"/></svg></div>
        <div class="empty-title">No Registrations Yet</div>
        <div class="empty-sub">You haven't joined any tournaments.</div>
        <a href="dashboard" class="empty-btn"><svg><use href="#i-plus"/></svg> Browse Tournaments</a>
      </div>`;
    return;
  }

  const list = document.createElement('div');
  list.className = 'reg-list';
  keys.forEach((tid, idx) => {
    const reg = myRegs[tid];
    const st  = serverTournaments[tid] || {};
    const color    = st.color ? hexColor(st.color) : '#5865F2';
    const iconHref = ICON_MAP[st.icon] || '#i-zap';
    const tname    = reg.tournament_name || st.name || tid;
    const card = document.createElement('div');
    card.className = 'reg-card';
    card.style.setProperty('--t-color', color);
    card.style.animationDelay = `${idx * 0.07}s`;
    card.id = `card-${tid}`;
    const safeGU = (reg.game_username || '').replace(/'/g, "\\'");
    const safeTN = tname.replace(/'/g, "\\'");
    card.innerHTML = `
      <div class="reg-card-stripe"></div>
      <div class="reg-card-body">
        <div class="reg-icon" style="border-color:${color}30;color:${color}">
          <svg width="24" height="24"><use href="${iconHref}"/></svg>
        </div>
        <div class="reg-info">
          <div class="reg-name">${tname}</div>
          <div class="reg-meta">
            <div class="reg-meta-item"><svg><use href="#i-user"/></svg><span>${reg.name || reg.discord_global_name || ''}</span></div>
            <div class="reg-meta-item"><svg><use href="#i-gamepad"/></svg><span>${reg.game_username || ''}</span></div>
            <div class="reg-meta-item"><svg><use href="#i-globe"/></svg><span>${reg.timezone || ''}</span></div>
          </div>
          <div class="reg-date"><svg width="9" height="9" style="vertical-align:middle;margin-right:4px"><use href="#i-clock"/></svg>Registered: ${reg.submitted_at || ''}</div>
        </div>
        <div class="reg-actions" id="actions-${tid}">
          <button class="cancel-btn" id="cancelBtn-${tid}" onclick="startCancel('${tid}')">
            <svg><use href="#i-x"/></svg> Cancel
          </button>
          <button class="confirm-btn" id="confirmBtn-${tid}" onclick="confirmCancel('${tid}','${safeTN}','${safeGU}')">
            <svg><use href="#i-alert"/></svg> Confirm Cancel
          </button>
          <button class="cancel-abort" id="abortBtn-${tid}" onclick="abortCancel('${tid}')">Keep Registration</button>
          <div class="cancel-loader" id="loader-${tid}"></div>
        </div>
      </div>`;
    list.appendChild(card);
  });
  container.appendChild(list);
}

function startCancel(tid) {
  document.getElementById(`cancelBtn-${tid}`).style.display = 'none';
  document.getElementById(`confirmBtn-${tid}`).classList.add('show');
  document.getElementById(`abortBtn-${tid}`).classList.add('show');
}
function abortCancel(tid) {
  document.getElementById(`cancelBtn-${tid}`).style.display = '';
  document.getElementById(`confirmBtn-${tid}`).classList.remove('show');
  document.getElementById(`abortBtn-${tid}`).classList.remove('show');
}
async function confirmCancel(tid, tname, gameUsername) {
  document.getElementById(`confirmBtn-${tid}`).style.display = 'none';
  document.getElementById(`abortBtn-${tid}`).classList.remove('show');
  document.getElementById(`loader-${tid}`).style.display = 'block';
  const payload = {
    action:'cancel', tournament_id:tid, tournament_name:tname,
    discord_username:user.username, discord_id:user.id,
    discord_global_name:user.globalName||user.username,
    discord_avatar:user.avatar, name:user.globalName||user.username,
    game_username:gameUsername||'', submitted_at:'', cancelled_at:new Date().toUTCString(),
  };
  try { await fetch('/.netlify/functions/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); } catch(e){}
  const card = document.getElementById(`card-${tid}`);
  card.style.transition = 'opacity 0.4s,transform 0.4s';
  card.style.opacity = '0'; card.style.transform = 'translateX(20px)';
  setTimeout(() => loadAndRender(), 420);
}

function checkAdmin() {
  const u = JSON.parse(localStorage.getItem('discord_user')||'{}');
  const link = document.getElementById('adminLink');
  if (link && u.id === '921970487431671859') link.style.display = '';
}
checkAdmin();
function toggleDropdown() {
  const pill = document.getElementById('userPill'), drop = document.getElementById('userDropdown');
  drop.classList.toggle('open'); pill.classList.toggle('open', drop.classList.contains('open'));
}
document.addEventListener('click', e => {
  if (!document.getElementById('userPill').contains(e.target)) {
    document.getElementById('userDropdown').classList.remove('open');
    document.getElementById('userPill').classList.remove('open');
  }
});
function logout() { localStorage.removeItem('discord_user'); window.location.href = 'index.html'; }
loadAndRender();

const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W, H, dots = [];
function resize() {
  W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; dots = [];
  const cols = Math.ceil(W/90), rows = Math.ceil(H/90);
  for(let x=0;x<=cols;x++) for(let y=0;y<=rows;y++)
    dots.push({x:x*90,y:y*90,ox:x*90,oy:y*90,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,r:Math.random()+.3,a:Math.random()*.35+.05});
}
function draw() {
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<dots.length;i++){
    const d=dots[i]; d.x+=d.vx; d.y+=d.vy; d.vx+=(d.ox-d.x)*.0005; d.vy+=(d.oy-d.y)*.0005;
    for(let j=i+1;j<dots.length;j++){const e=dots[j],dx=d.x-e.x,dy=d.y-e.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<120){ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(e.x,e.y);ctx.strokeStyle=`rgba(88,101,242,${0.04*(1-dist/120)})`;ctx.lineWidth=.5;ctx.stroke();}}
    ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fillStyle=`rgba(88,101,242,${d.a})`;ctx.fill();
  }
  requestAnimationFrame(draw);
}
window.addEventListener('resize',resize); resize(); draw();
</script>
