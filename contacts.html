<!DOCTYPE html>
<html>
<head>
  <title>Axon Cord</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">Contacts</div>

<!-- Contact List -->
<div id="contactList" class="page-content"></div>

<!-- Floating Add Button -->
<div class="fab" id="addContactBtn">
  <svg viewBox="0 0 24 24">
    <line x1="12" y1="5" x2="12" y2="19" stroke="white" stroke-width="2"/>
    <line x1="5" y1="12" x2="19" y2="12" stroke="white" stroke-width="2"/>
  </svg>
</div>

<!-- Custom Modal -->
<div id="modal" class="modal">
  <div class="modal-box">
    <h3>Add Contact</h3>
    <input id="emailInput" placeholder="Enter user email">
    <button id="confirmAdd">Add Contact</button>
  </div>
</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <a href="index.html">
    <svg viewBox="0 0 24 24">
      <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>
    </svg>
    <span>Chats</span>
  </a>

  <a href="contacts.html" class="active">
    <svg viewBox="0 0 24 24">
      <path d="M16 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm-8 0a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm0 2c-4 0-6 2-6 4v1h8v-1c0-2-2-4-2-4zm8 0c-4 0-6 2-6 4v1h12v-1c0-2-4-4-6-4z"/>
    </svg>
    <span>Contacts</span>
  </a>

  <a href="profile.html">
    <svg viewBox="0 0 24 24">
      <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-5 0-9 2.5-9 5v1h18v-1c0-2.5-4-5-9-5z"/>
    </svg>
    <span>Profile</span>
  </a>
</div>

<script type="module">
import { protectPage } from "./auth.js";
import {
  findUserByEmail,
  addContact,
  listenToContacts,
  createOrGetChat
} from "./chatService.js";

protectPage();

const modal = document.getElementById("modal");
const emailInput = document.getElementById("emailInput");

/* Open Modal */
document.getElementById("addContactBtn").onclick = () => {
  modal.style.display = "flex";
};

/* Close modal when clicking outside */
modal.onclick = (e) => {
  if (e.target === modal) {
    modal.style.display = "none";
  }
};

/* Add Contact */
document.getElementById("confirmAdd").onclick = async () => {

  const email = emailInput.value.trim().toLowerCase();
  if (!email) return;

  const userDoc = await findUserByEmail(email);

  if (!userDoc) {
    alert("User not found");
    return;
  }

  await addContact(userDoc.id);

  emailInput.value = "";
  modal.style.display = "none";
};

/* Render Contact List */
listenToContacts((contacts) => {

  const container = document.getElementById("contactList");
  container.innerHTML = "";

  if (contacts.length === 0) {
    container.innerHTML = `<p class="empty-text">No contacts yet</p>`;
    return;
  }

  contacts.forEach(contact => {

    const card = document.createElement("div");
    card.className = "contact-card";

    card.innerHTML = `
      <div class="contact-name">${contact.displayName}</div>
      <div class="contact-email">${contact.email}</div>
    `;

    card.onclick = async () => {
      const chatId = await createOrGetChat(contact.uid);
      window.location.href = "chat.html?id=" + chatId;
    };

    container.appendChild(card);
  });

});
</script>

</body>
</html>
