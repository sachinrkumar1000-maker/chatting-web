<!DOCTYPE html>
<html>
<head>
  <title>Axon Cord</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">Contacts</div>

<div id="contactList" style="padding:20px;padding-bottom:90px;"></div>

<!-- Floating Add Button -->
<div class="fab" id="addContactBtn">
  +
</div>

<!-- Custom Modal -->
<div id="modal" style="display:none;
     position:fixed;
     top:0;left:0;
     width:100%;height:100%;
     background:rgba(0,0,0,0.5);
     justify-content:center;
     align-items:center;">

  <div style="background:white;padding:25px;width:300px;border-radius:12px;">
    <h3>Add Contact</h3>
    <input id="emailInput"
           placeholder="Enter email"
           style="width:100%;padding:10px;margin:10px 0;border:1px solid #ccc;border-radius:6px;">
    <button id="confirmAdd"
            style="padding:10px 14px;background:#2563eb;color:white;border:none;border-radius:6px;">
      Add
    </button>
  </div>
</div>

<script type="module">
import { protectPage } from "./auth.js";
import {
  findUserByEmail,
  addContact,
  listenToContacts,
  createOrGetChat
} from "./chatService.js";

protectPage();

const modal = document.getElementById("modal");
const emailInput = document.getElementById("emailInput");

document.getElementById("addContactBtn").onclick = () => {
  modal.style.display = "flex";
};

document.getElementById("confirmAdd").onclick = async () => {

  const email = emailInput.value;
  if (!email) return;

  const userDoc = await findUserByEmail(email);

  if (!userDoc) {
    alert("User not found");
    return;
  }

  await addContact(userDoc.id);

  emailInput.value = "";
  modal.style.display = "none";
};

/* Render Contact List */
listenToContacts((contacts) => {

  const container = document.getElementById("contactList");
  container.innerHTML = "";

  contacts.forEach(contact => {

    const div = document.createElement("div");

    div.style.padding = "15px";
    div.style.background = "white";
    div.style.marginBottom = "10px";
    div.style.borderRadius = "8px";
    div.style.cursor = "pointer";
    div.style.boxShadow = "0 2px 6px rgba(0,0,0,0.05)";

    div.innerHTML = `
      <strong>${contact.displayName}</strong><br>
      <small>${contact.email}</small>
    `;

    div.onclick = async () => {
      const chatId = await createOrGetChat(contact.uid);
      window.location.href = "chat.html?id=" + chatId;
    };

    container.appendChild(div);
  });

});
</script>

</body>
</html>
