<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="icon" href="sk-logo.webp" type="image/webp"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Profile — Sovereigns Kingdom</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#03050d;--panel:rgba(8,12,24,0.92);
  --border:rgba(88,101,242,0.2);--border2:rgba(88,101,242,0.08);
  --accent:#5865F2;--accent-h:#7289da;--glow:rgba(88,101,242,0.4);
  --cyan:#00d4ff;--green:#22c55e;--yellow:#fbbf24;--red:#f38ba8;--orange:#f97316;
  --text:#cdd6f4;--muted:#525a7a;--muted2:#3a4260;
  --font:'Rajdhani',sans-serif;--mono:'Share Tech Mono',monospace;
  --r:3px;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.4}
body::after{content:'';position:fixed;inset:0;z-index:1;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:62px;background:rgba(3,5,13,0.96);border-bottom:1px solid var(--border);backdrop-filter:blur(24px);box-shadow:0 1px 0 rgba(88,101,242,0.08),0 8px 32px rgba(0,0,0,0.6)}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-logo{display:flex;align-items:center;justify-content:center;width:36px;height:36px;background:transparent;flex-shrink:0}
.topbar-brand{font-size:17px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#fff}
.topbar-sep{width:1px;height:18px;background:var(--border)}
.topbar-tag{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.15em}
.back-btn{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.1em;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:6px 14px;border-radius:var(--r);transition:all 0.2s}
.back-btn svg{width:11px;height:11px}
.back-btn:hover{color:var(--text);background:rgba(88,101,242,0.08);border-color:rgba(88,101,242,0.4)}

/* USER PILL */
.user-pill{display:flex;align-items:center;gap:10px;padding:5px 12px 5px 5px;border:1px solid var(--border);border-radius:var(--r);background:rgba(88,101,242,0.05);cursor:pointer;transition:all 0.2s;position:relative;user-select:none}
.user-pill:hover{background:rgba(88,101,242,0.11);border-color:rgba(88,101,242,0.38)}
.u-avatar{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--accent);object-fit:cover;box-shadow:0 0 10px rgba(88,101,242,0.4)}
.u-name{font-size:13px;font-weight:700;color:#fff;line-height:1;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.u-status{font-family:var(--mono);font-size:9px;color:var(--green)}
.pill-chevron{transition:transform 0.22s cubic-bezier(.22,1,.36,1);flex-shrink:0}
.user-pill.open .pill-chevron{transform:rotate(180deg)}

/* DROPDOWN */
.user-dropdown{position:absolute;top:calc(100%+10px);right:0;background:rgba(6,9,20,0.98);border:1px solid rgba(88,101,242,0.22);border-radius:var(--r);min-width:220px;box-shadow:0 16px 48px rgba(0,0,0,0.75);overflow:hidden;opacity:0;pointer-events:none;transform:translateY(-6px) scale(0.98);transition:opacity 0.18s,transform 0.22s cubic-bezier(.22,1,.36,1);z-index:200}
.user-dropdown.open{opacity:1;pointer-events:all;transform:translateY(0) scale(1)}
.dd-header{padding:12px 16px 10px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:10px}
.dd-header-av{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--accent);object-fit:cover;flex-shrink:0}
.dd-header-name{font-size:13px;font-weight:700;color:#fff;letter-spacing:0.04em}
.dd-header-id{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.06em}
.dd-label{font-family:var(--mono);font-size:8px;color:var(--muted2);letter-spacing:0.2em;padding:6px 16px 2px}
.dd-item{display:flex;align-items:center;gap:11px;padding:9px 16px;font-size:13px;font-weight:600;letter-spacing:0.05em;color:var(--muted);cursor:pointer;border:none;background:none;width:100%;text-align:left;text-decoration:none;transition:color 0.15s,background 0.15s}
.dd-item:hover{color:#fff;background:rgba(88,101,242,0.09)}
.dd-item:hover .di-icon{color:var(--accent)}
.dd-item.danger:hover{color:var(--red);background:rgba(243,139,168,0.06)}
.dd-item.danger:hover .di-icon{color:var(--red)}
.di-icon{width:15px;height:15px;flex-shrink:0;transition:color 0.15s}
.dd-divider{height:1px;background:var(--border2);margin:4px 0}

/* CONTENT */
.content{position:relative;z-index:2;padding:36px 40px;max-width:960px;margin:0 auto}

/* HERO CARD */
.hero{position:relative;border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:32px;animation:fadeUp 0.4s cubic-bezier(.22,1,.36,1) both}
.hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,rgba(88,101,242,0.1) 0%,rgba(0,212,255,0.04) 50%,rgba(88,101,242,0.06) 100%)}
.hero-glow{position:absolute;top:-80px;right:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(88,101,242,0.12) 0%,transparent 70%);pointer-events:none}
.hero-topbar{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--cyan),var(--accent));background-size:200%;animation:shimmer 4s linear infinite}
.hero-body{position:relative;z-index:1;padding:32px 36px;display:flex;align-items:flex-start;gap:28px;flex-wrap:wrap}
.hero-av-wrap{position:relative;flex-shrink:0}
.hero-av{width:96px;height:96px;border-radius:50%;border:3px solid var(--accent);box-shadow:0 0 32px rgba(88,101,242,0.4),0 0 0 8px rgba(88,101,242,0.06);object-fit:cover}
.hero-online{position:absolute;bottom:4px;right:4px;width:16px;height:16px;background:var(--green);border:2.5px solid var(--bg);border-radius:50%;box-shadow:0 0 8px var(--green)}
.hero-info{flex:1;min-width:0}
.hero-name{font-size:32px;font-weight:700;color:#fff;letter-spacing:0.04em;line-height:1;margin-bottom:6px}
.hero-tag{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.15em;margin-bottom:4px}
.hero-id{font-family:var(--mono);font-size:10px;color:var(--muted2);letter-spacing:0.08em;margin-bottom:20px}
.hero-stats{display:flex;gap:10px;flex-wrap:wrap}
.stat-box{display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 22px;background:rgba(88,101,242,0.06);border:1px solid var(--border2);border-radius:var(--r);min-width:80px;transition:border-color 0.2s,background 0.2s}
.stat-box:hover{border-color:var(--border);background:rgba(88,101,242,0.1)}
.stat-val{font-size:26px;font-weight:700;color:#fff;line-height:1;font-family:var(--mono)}
.stat-label{font-family:var(--mono);font-size:8px;color:var(--muted);letter-spacing:0.2em;text-transform:uppercase}
.stat-box.cyan .stat-val{color:var(--cyan)}
.stat-box.gold .stat-val{color:var(--yellow)}
.stat-box.red .stat-val{color:var(--red)}
.stat-box.green .stat-val{color:var(--green)}

/* SECTION HEADERS */
.sec-title{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.sec-title-text{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:0.22em;color:var(--muted);text-transform:uppercase;white-space:nowrap}
.sec-title-text em{color:var(--accent);font-style:normal}
.sec-rule{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

/* ACTIVE REGS */
.reg-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px}
.reg-chip{display:flex;align-items:center;gap:8px;padding:8px 16px;background:rgba(0,212,255,0.05);border:1px solid rgba(0,212,255,0.18);border-radius:var(--r);font-family:var(--mono);font-size:10px;font-weight:700;color:var(--cyan);letter-spacing:0.06em;transition:background 0.2s,border-color 0.2s}
.reg-chip:hover{background:rgba(0,212,255,0.1);border-color:rgba(0,212,255,0.35)}
.reg-chip-dot{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 6px var(--cyan);flex-shrink:0}
.no-regs{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:0.12em;padding:16px 0;margin-bottom:24px}

/* TIMELINE */
.timeline{display:flex;flex-direction:column}
.t-item{display:flex;gap:16px;animation:fadeUp 0.35s cubic-bezier(.22,1,.36,1) both}
.t-left{display:flex;flex-direction:column;align-items:center;width:22px;flex-shrink:0;padding-top:4px}
.t-dot{width:11px;height:11px;border-radius:50%;border:2px solid;flex-shrink:0}
.t-dot.registered{background:rgba(34,197,94,0.15);border-color:var(--green);box-shadow:0 0 8px rgba(34,197,94,0.4)}
.t-dot.cancelled{background:rgba(243,139,168,0.12);border-color:var(--red)}
.t-dot.podium{background:rgba(251,191,36,0.15);border-color:var(--yellow);box-shadow:0 0 8px rgba(251,191,36,0.4)}
.t-line{flex:1;width:1px;background:linear-gradient(180deg,var(--border2),transparent);margin:3px 0;min-height:16px}
.t-body{flex:1;padding-bottom:22px}
.t-card{background:var(--panel);border:1px solid var(--border2);border-radius:var(--r);padding:14px 18px;transition:border-color 0.2s}
.t-card:hover{border-color:var(--border)}
.t-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:0.16em;padding:3px 9px;border-radius:var(--r);margin-bottom:7px}
.t-badge.registered{color:var(--green);background:rgba(34,197,94,0.07);border:1px solid rgba(34,197,94,0.2)}
.t-badge.cancelled{color:var(--red);background:rgba(243,139,168,0.07);border:1px solid rgba(243,139,168,0.2)}
.t-badge.podium{color:var(--yellow);background:rgba(251,191,36,0.07);border:1px solid rgba(251,191,36,0.2)}
.t-title{font-size:14px;font-weight:700;color:var(--text);letter-spacing:0.03em;line-height:1.4}
.t-title strong{color:#fff}
.t-meta{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.08em;margin-top:5px;display:flex;flex-wrap:wrap;gap:12px}
.t-meta-admin{color:var(--accent);opacity:0.7}

.empty-hist{display:flex;flex-direction:column;align-items:center;gap:14px;padding:56px 0;text-align:center;color:var(--muted2)}
.empty-hist svg{width:36px;height:36px;opacity:0.25}
.empty-hist p{font-family:var(--mono);font-size:11px;letter-spacing:0.16em}
.loading-mono{font-family:var(--mono);font-size:11px;color:var(--muted);padding:14px 0;letter-spacing:0.14em}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:0%}100%{background-position:200%}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

@media(max-width:640px){
  .topbar{padding:0 16px;height:56px}.topbar-sep,.topbar-tag{display:none}.topbar-brand{font-size:14px}
  .content{padding:20px 16px}
  .hero-body{padding:22px 18px;gap:18px}
  .hero-av{width:72px;height:72px}
  .hero-name{font-size:24px}
  .hero-stats{gap:8px}
  .stat-box{min-width:64px;padding:10px 14px}
  .stat-val{font-size:20px}
}
@media(max-width:400px){.topbar-brand{display:none}}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<svg style="display:none">
  <symbol id="i-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 5l-7 7 7 7"/></symbol>
  <symbol id="i-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></symbol>
  <symbol id="i-list" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></symbol>
  <symbol id="i-trophy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4a2 2 0 01-2-2V5h4M18 9h2a2 2 0 002-2V5h-4"/><path d="M6 5h12v6a6 6 0 01-12 0V5z"/><path d="M12 17v4M8 21h8"/></symbol>
  <symbol id="i-logout" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></symbol>
  <symbol id="i-ticket" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5v2M15 11v2M15 17v2M5 5h14a2 2 0 012 2v3a2 2 0 000 4v3a2 2 0 01-2 2H5a2 2 0 01-2-2v-3a2 2 0 000-4V7a2 2 0 012-2z"/></symbol>
  <symbol id="i-shield" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></symbol>
  <symbol id="i-zap" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></symbol>
</svg>

<nav class="topbar">
  <div class="topbar-left">
    <div class="topbar-logo">
      <img src="sk-logo.webp" alt="SK" style="width:32px;height:32px;object-fit:contain;border-radius:2px;"/>
    </div>
    <span class="topbar-brand">Sovereigns Kingdom</span>
    <div class="topbar-sep"></div>
    <span class="topbar-tag">v2.5.0</span>
    <a href="dashboard" class="back-btn"><svg><use href="#i-left"/></svg> Dashboard</a>
  </div>
  <div style="position:relative">
    <div class="user-pill" id="userPill" onclick="toggleDropdown()">
      <img class="u-avatar" id="topAvatar" src="" alt=""/>
      <div style="display:flex;flex-direction:column;gap:2px">
        <div class="u-name" id="topName">...</div>
        <div class="u-status">● ONLINE</div>
      </div>
      <svg class="pill-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
    </div>
    <div class="user-dropdown" id="userDropdown">
      <div class="dd-header">
        <img class="dd-header-av" id="dropAv" src="" alt=""/>
        <div>
          <div class="dd-header-name" id="dropName">—</div>
          <div class="dd-header-id" id="dropId">—</div>
        </div>
      </div>
      <div class="dd-label">Navigate</div>
      <a href="profile" class="dd-item"><svg class="di-icon"><use href="#i-user"/></svg> My Profile</a>
      <a href="my-registrations" class="dd-item"><svg class="di-icon"><use href="#i-list"/></svg> My Registrations</a>
      <a href="leaderboard" class="dd-item"><svg class="di-icon"><use href="#i-trophy"/></svg> Leaderboard</a>
      <a href="tickets" class="dd-item"><svg class="di-icon"><use href="#i-ticket"/></svg> Support Ticket</a>
      <a href="admin" id="adminLink" style="display:none" class="dd-item"><svg class="di-icon"><use href="#i-shield"/></svg> Admin Panel</a>
      <div class="dd-divider"></div>
      <button class="dd-item danger" onclick="logout()"><svg class="di-icon"><use href="#i-logout"/></svg> Sign Out</button>
    </div>
  </div>
</nav>

<div class="content">

  <!-- HERO -->
  <div class="hero">
    <div class="hero-bg"></div>
    <div class="hero-glow"></div>
    <div class="hero-topbar"></div>
    <div class="hero-body">
      <div class="hero-av-wrap">
        <img class="hero-av" id="pAvatar" src="" alt=""/>
        <div class="hero-online"></div>
      </div>
      <div class="hero-info">
        <div class="hero-name" id="pName">...</div>
        <div class="hero-tag" id="pTag">...</div>
        <div class="hero-id" id="pId">...</div>
        <div class="hero-stats">
          <div class="stat-box cyan"><div class="stat-val" id="sCurrent">—</div><div class="stat-label">Active</div></div>
          <div class="stat-box"><div class="stat-val" id="sTotal">—</div><div class="stat-label">Total Regs</div></div>
          <div class="stat-box red"><div class="stat-val" id="sCancelled">—</div><div class="stat-label">Cancelled</div></div>
          <div class="stat-box gold"><div class="stat-val" id="sPodiums">—</div><div class="stat-label">Podiums</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ACTIVE REGISTRATIONS -->
  <div class="sec-title"><span class="sec-title-text">// Active <em>Registrations</em></span><div class="sec-rule"></div></div>
  <div id="activeWrap"><div class="loading-mono">LOADING...</div></div>

  <!-- ACTIVITY HISTORY -->
  <div class="sec-title" style="margin-top:8px"><span class="sec-title-text">// Activity <em>History</em></span><div class="sec-rule"></div></div>
  <div id="historyWrap"><div class="loading-mono">LOADING...</div></div>

</div>

<script>
const raw = localStorage.getItem('discord_user');
if (!raw) window.location.href = 'index.html';
const user = JSON.parse(raw);
const dn = user.globalName || user.username;

document.getElementById('topAvatar').src = user.avatar;
document.getElementById('topName').textContent = dn;
document.getElementById('dropAv').src = user.avatar;
document.getElementById('dropName').textContent = dn;
document.getElementById('dropId').textContent = 'ID: ' + user.id;
document.getElementById('pAvatar').src = user.avatar;
document.getElementById('pName').textContent = dn;
document.getElementById('pTag').textContent = '@' + user.username;
document.getElementById('pId').textContent = 'DISCORD ID: ' + user.id;

async function loadProfile() {
  try {
    const [hRes, sRes, myRes] = await Promise.all([
      fetch('/.netlify/functions/register/history/' + user.id),
      fetch('/.netlify/functions/register'),
      fetch('/.netlify/functions/register/my-registrations/' + user.id),
    ]);
    const hData  = hRes.ok  ? await hRes.json()  : { history: [] };
    const sData  = sRes.ok  ? await sRes.json()  : { winners: {}, tournaments: {} };
    const myData = myRes.ok ? await myRes.json() : { registrations: {} };
    const hist     = hData.history        || [];
    const winners  = sData.winners        || {};
    const tourns   = sData.tournaments    || {};
    const myRegs   = myData.registrations || {};
    const activeKeys = Object.keys(myRegs);

    document.getElementById('sCurrent').textContent   = activeKeys.length;
    document.getElementById('sTotal').textContent     = hist.filter(h => h.type === 'registered').length;
    document.getElementById('sCancelled').textContent = hist.filter(h => h.type === 'cancelled').length;
    let podiums = 0;
    for (const places of Object.values(winners))
      for (const info of Object.values(places))
        if (info.discord_id === user.id) podiums++;
    document.getElementById('sPodiums').textContent = podiums;

    const activeWrap = document.getElementById('activeWrap');
    if (activeKeys.length === 0) {
      activeWrap.innerHTML = '<div class="no-regs">No active registrations.</div>';
    } else {
      const row = document.createElement('div');
      row.className = 'reg-grid';
      activeKeys.forEach(tid => {
        const reg = myRegs[tid];
        const chip = document.createElement('div');
        chip.className = 'reg-chip';
        chip.innerHTML = '<div class="reg-chip-dot"></div>' + (reg.tournament_name || tourns[tid]?.name || tid);
        row.appendChild(chip);
      });
      activeWrap.innerHTML = '';
      activeWrap.appendChild(row);
    }

    const podiumEntries = [];
    for (const [tid, places] of Object.entries(winners))
      for (const [place, info] of Object.entries(places))
        if (info.discord_id === user.id)
          podiumEntries.push({ type:'podium', tournament_name: tourns[tid]?.name || tid, place, timestamp:'' });

    renderTimeline([...podiumEntries, ...hist]);
  } catch(e) {
    document.getElementById('historyWrap').innerHTML = '<div class="loading-mono">Could not load data. Is the bot running?</div>';
    document.getElementById('activeWrap').innerHTML  = '<div class="no-regs">Could not load.</div>';
    ['sCurrent','sTotal','sCancelled','sPodiums'].forEach(id => document.getElementById(id).textContent = '?');
  }
}

function renderTimeline(entries) {
  const wrap = document.getElementById('historyWrap');
  if (!entries.length) {
    wrap.innerHTML = '<div class="empty-hist"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><use href="#i-zap"/></svg><p>NO ACTIVITY YET</p></div>';
    return;
  }
  const labels = { registered:'REGISTERED', cancelled:'CANCELLED', podium:'PODIUM FINISH' };
  const verbs  = { registered:'Registered for', cancelled:'Cancelled registration for', podium:'Finished in' };
  const tl = document.createElement('div');
  tl.className = 'timeline';
  entries.forEach((e, i) => {
    const item = document.createElement('div');
    item.className = 't-item';
    item.style.animationDelay = (i * 0.04) + 's';
    const isLast = i === entries.length - 1;
    const bType  = e.type === 'podium' ? 'podium' : e.type;
    const tname  = e.tournament_name || e.tournament_id || '';
    item.innerHTML =
      '<div class="t-left">' +
        '<div class="t-dot ' + bType + '"></div>' +
        (isLast ? '' : '<div class="t-line"></div>') +
      '</div>' +
      '<div class="t-body"><div class="t-card">' +
        '<div class="t-badge ' + bType + '">' + (labels[e.type]||e.type.toUpperCase()) + '</div>' +
        '<div class="t-title">' + (verbs[e.type]||e.type) + ' <strong>' + tname + '</strong>' + (e.type==='podium'?' — <strong>'+e.place+' Place</strong>':'') + '</div>' +
        '<div class="t-meta">' +
          (e.game_username ? '<span>Tag: ' + e.game_username + '</span>' : '') +
          (e.timestamp     ? '<span>' + e.timestamp + '</span>' : '') +
          (e.manual        ? '<span class="t-meta-admin">Added by admin</span>' : '') +
        '</div>' +
      '</div></div>';
    tl.appendChild(item);
  });
  wrap.innerHTML = '';
  wrap.appendChild(tl);
}

loadProfile();

function checkAdmin() {
  const u = JSON.parse(localStorage.getItem('discord_user')||'{}');
  const link = document.getElementById('adminLink');
  if (link && u.id === '921970487431671859') link.style.display = '';
}
checkAdmin();
function toggleDropdown() {
  const pill = document.getElementById('userPill');
  const drop = document.getElementById('userDropdown');
  drop.classList.toggle('open');
  pill.classList.toggle('open', drop.classList.contains('open'));
}
document.addEventListener('click', e => {
  if (!document.getElementById('userPill').contains(e.target)) {
    document.getElementById('userDropdown').classList.remove('open');
    document.getElementById('userPill').classList.remove('open');
  }
});
function logout() { localStorage.removeItem('discord_user'); window.location.href = 'index.html'; }

const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let W, H, dots = [];
function resize() {
  W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; dots = [];
  const c = Math.ceil(W/90), r = Math.ceil(H/90);
  for(let x=0;x<=c;x++) for(let y=0;y<=r;y++)
    dots.push({x:x*90,y:y*90,ox:x*90,oy:y*90,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,r:Math.random()+.3,a:Math.random()*.3+.04});
}
function draw() {
  ctx.clearRect(0,0,W,H);
  for(let i=0;i<dots.length;i++){
    const d=dots[i]; d.x+=d.vx; d.y+=d.vy; d.vx+=(d.ox-d.x)*.0005; d.vy+=(d.oy-d.y)*.0005;
    for(let j=i+1;j<dots.length;j++){
      const e=dots[j],dx=d.x-e.x,dy=d.y-e.y,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<120){ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(e.x,e.y);ctx.strokeStyle='rgba(88,101,242,'+(0.04*(1-dist/120))+')';ctx.lineWidth=.5;ctx.stroke();}
    }
    ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fillStyle='rgba(88,101,242,'+d.a+')';ctx.fill();
  }
  requestAnimationFrame(draw);
}
window.addEventListener('resize',resize); resize(); draw();
</script>
