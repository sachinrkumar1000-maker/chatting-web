<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Axon Cord</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">Axon Cord</div>

<div class="main">
  <div style="text-align:center;">

    <img id="userPhoto"
         style="width:90px;height:90px;border-radius:50%;margin-bottom:15px;display:none;">

    <h2 id="userName">Loading...</h2>
    <p id="userEmail" style="color:#6b7280;margin-top:6px;"></p>

    <button id="logoutBtn"
      style="margin-top:20px;
             padding:10px 16px;
             background:#ef4444;
             border:none;
             border-radius:6px;
             color:white;
             cursor:pointer;">
      Logout
    </button>

  </div>
</div>

<div class="bottom-nav">
  <a href="index.html">
    <svg viewBox="0 0 24 24">
      <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>
    </svg>
    <span>Chats</span>
  </a>

  <a href="contacts.html">
    <svg viewBox="0 0 24 24">
      <path d="M16 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm-8 0a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm0 2c-4 0-6 2-6 4v1h8v-1c0-2-2-4-2-4zm8 0c-4 0-6 2-6 4v1h12v-1c0-2-4-4-6-4z"/>
    </svg>
    <span>Contacts</span>
  </a>

  <a href="profile.html" class="active">
    <svg viewBox="0 0 24 24">
      <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-5 0-9 2.5-9 5v1h18v-1c0-2.5-4-5-9-5z"/>
    </svg>
    <span>Profile</span>
  </a>
</div>

<script type="module">
  import { protectPage, logoutUser } from "./auth.js";
  import { getCurrentUser } from "./auth.js";

  protectPage();

  const user = getCurrentUser();

  import { auth } from "./firebase.js";
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("userName").textContent = user.displayName;
      document.getElementById("userEmail").textContent = user.email;

      if (user.photoURL) {
        const photo = document.getElementById("userPhoto");
        photo.src = user.photoURL;
        photo.style.display = "block";
      }
    }
  });

  document.getElementById("logoutBtn")
    .addEventListener("click", logoutUser);
</script>

</body>
</html>
