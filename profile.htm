<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Axon Cord</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="profile-header">Profile</div>

<div class="profile-container">

  <!-- Top User Info -->
  <div class="profile-top">
    <div class="profile-avatar" id="avatar">
      S
    </div>

    <div class="profile-name" id="userName">Loading...</div>
    <div class="profile-email" id="userEmail"></div>
  </div>

  <!-- ACCOUNT -->
  <div class="section-title">ACCOUNT</div>

  <div class="list-item">
    <div class="list-left">
      <svg viewBox="0 0 24 24">
        <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-5 0-9 2.5-9 5v1h18v-1c0-2.5-4-5-9-5z"/>
      </svg>
      <span>Edit Profile</span>
    </div>
    <span class="arrow">›</span>
  </div>

  <div class="list-item">
    <div class="list-left">
      <svg viewBox="0 0 24 24">
        <path d="M12 22a2 2 0 0 0 2-2h-4a2 2 0 0 0 2 2zm6-6V11a6 6 0 1 0-12 0v5l-2 2v1h16v-1z"/>
      </svg>
      <span>Notifications</span>
    </div>
    <span class="arrow">›</span>
  </div>

  <div class="list-item">
    <div class="list-left">
      <svg viewBox="0 0 24 24">
        <path d="M12 1a5 5 0 0 0-5 5v4H5v12h14V10h-2V6a5 5 0 0 0-5-5zm-3 9V6a3 3 0 0 1 6 0v4z"/>
      </svg>
      <span>Privacy</span>
    </div>
    <span class="arrow">›</span>
  </div>

  <!-- SUPPORT -->
  <div class="section-title">SUPPORT</div>

  <div class="list-item">
    <div class="list-left">
      <svg viewBox="0 0 24 24">
        <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm1 15h-2v-2h2zm1.07-7.75-.9.92A3.49 3.49 0 0 0 12 14h-1v-1a4.5 4.5 0 0 1 1.32-3.18l1.24-1.26a2 2 0 1 0-3.41-1.41H8a4 4 0 1 1 6.07 3.41z"/>
      </svg>
      <span>Help & Support</span>
    </div>
    <span class="arrow">›</span>
  </div>

  <div class="list-item">
    <div class="list-left">
      <svg viewBox="0 0 24 24">
        <path d="M11 7h2v2h-2zm0 4h2v6h-2zm1-9a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"/>
      </svg>
      <span>About</span>
    </div>
    <span class="arrow">›</span>
  </div>

  <!-- Logout -->
  <div class="logout-container">
    <button id="logoutBtn" class="logout-btn">
      Logout
    </button>
  </div>

</div>

<!-- Bottom Navigation -->
<div class="bottom-nav">
  <a href="index.html">
    <svg viewBox="0 0 24 24">
      <path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"/>
    </svg>
    <span>Chats</span>
  </a>

  <a href="contacts.html">
    <svg viewBox="0 0 24 24">
      <path d="M16 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm-8 0a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm0 2c-4 0-6 2-6 4v1h8v-1c0-2-2-4-2-4zm8 0c-4 0-6 2-6 4v1h12v-1c0-2-4-4-6-4z"/>
    </svg>
    <span>Contacts</span>
  </a>

  <a href="profile.html" class="active">
    <svg viewBox="0 0 24 24">
      <path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-5 0-9 2.5-9 5v1h18v-1c0-2.5-4-5-9-5z"/>
    </svg>
    <span>Profile</span>
  </a>
</div>

<script type="module">
  import { protectPage, logoutUser } from "./auth.js";
  import { auth } from "./firebase.js";
  import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

  protectPage();

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById("userName").textContent = user.displayName;
      document.getElementById("userEmail").textContent = user.email;

      const avatar = document.getElementById("avatar");

      if (user.photoURL) {
        avatar.innerHTML = `<img src="${user.photoURL}" />`;
      } else {
        avatar.textContent = user.displayName.charAt(0);
      }
    }
  });

  document.getElementById("logoutBtn")
    .addEventListener("click", logoutUser);
</script>

</body>
</html>
