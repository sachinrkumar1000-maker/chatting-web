<!DOCTYPE html>
<html>
<head>
  <title>Login - Axon Cord</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body style="display:flex;justify-content:center;align-items:center;height:100vh;">

<div style="text-align:center;">
  <h1 style="margin-bottom:20px;">Axon Cord</h1>

  <button id="loginBtn"
    style="padding:12px 20px;
           border:none;
           border-radius:6px;
           background:#2563eb;
           color:white;
           font-size:16px;
           cursor:pointer;">
    Sign in with Google
  </button>
</div>

<script type="module">
  import { loginWithGoogle, bypassIfLoggedIn } from "./auth.js";

  bypassIfLoggedIn();

  document.getElementById("loginBtn")
    .addEventListener("click", loginWithGoogle);
</script>

</body>
</html>
